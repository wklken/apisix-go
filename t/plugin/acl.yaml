sources:
  - repository: https://github.com/apache/apisix
    commit: c3d7d5ec69774121f53d2e20d29d09c816795dd7
    file: t/plugin/acl.t
    tests: 58
  - repository: https://github.com/apache/apisix
    commit: c3d7d5ec69774121f53d2e20d29d09c816795dd7
    file: t/plugin/acl2.t
    tests: 4

cases:
  - name: allow-consumers-by-org
    source:
      file: t/plugin/acl.t
      tests: [1, 2, 3, 4, 5, 6]
    runtime: &consumer_runtime
      plugins: [acl, basic-auth]
    config:
      routes:
        - id: acl-allow-org
          uri: /hello
          plugins:
            basic-auth: {}
            acl:
              allow_labels:
                org: [apache]
          upstream: &fixture_upstream
            type: roundrobin
            nodes:
              "{{FIXTURE.primary.ADDR}}": 1
      consumers: &consumers
        - username: jack
          labels:
            org: apache
            project: gateway,apisix,web-server
          plugins:
            basic-auth:
              username: jack
              password: "123456"
        - username: rose
          labels:
            org: '["opensource","apache"]'
            project: '["tomcat","web-server","http,server"]'
          plugins:
            basic-auth:
              username: rose
              password: "123456"
    fixtures:
      - &hello_fixture
        name: primary
        kind: http
        respond:
          - status: 200
            body: hello world
    steps:
      - name: unauthorized
        input:
          path: /hello
        output: &missing_basic_auth
          status: 401
          body:
            matches: 'Missing authorization in request'
      - name: jack-allowed
        input:
          path: /hello
          headers:
            Authorization: Basic amFjazoxMjM0NTY=
        output: &hello_output
          status: 200
          body:
            equals: hello world
      - name: rose-allowed
        input:
          path: /hello
          headers:
            Authorization: Basic cm9zZToxMjM0NTY=
        output: *hello_output

  - name: allow-consumer-by-project
    source:
      file: t/plugin/acl.t
      tests: [7, 8, 9]
    runtime: *consumer_runtime
    config:
      routes:
        - id: acl-allow-project
          uri: /hello
          plugins:
            basic-auth: {}
            acl:
              allow_labels:
                project: [apisix]
          upstream: *fixture_upstream
      consumers: *consumers
    fixtures: [*hello_fixture]
    steps:
      - name: jack-allowed
        input:
          path: /hello
          headers:
            Authorization: Basic amFjazoxMjM0NTY=
        output: *hello_output
      - name: rose-forbidden
        input:
          path: /hello
          headers:
            Authorization: Basic cm9zZToxMjM0NTY=
        output: &acl_forbidden
          status: 403
          body:
            matches: 'The consumer is forbidden\.'

  - name: deny-consumer-by-project-with-custom-message
    source:
      file: t/plugin/acl.t
      tests: [10, 11, 12]
    runtime: *consumer_runtime
    config:
      routes:
        - id: acl-deny-project
          uri: /hello
          plugins:
            basic-auth: {}
            acl:
              deny_labels:
                project: [apisix]
              rejected_msg: request is forbidden
          upstream: *fixture_upstream
      consumers: *consumers
    fixtures: [*hello_fixture]
    steps:
      - name: jack-forbidden
        input:
          path: /hello
          headers:
            Authorization: Basic amFjazoxMjM0NTY=
        output:
          status: 403
          body:
            matches: 'request is forbidden'
      - name: rose-allowed
        input:
          path: /hello
          headers:
            Authorization: Basic cm9zZToxMjM0NTY=
        output: *hello_output

  - name: deny-consumers-by-multiple-project-values
    source:
      file: t/plugin/acl.t
      tests: [13, 14, 15]
    runtime: *consumer_runtime
    config:
      routes:
        - id: acl-deny-multiple-projects
          uri: /hello
          plugins:
            basic-auth: {}
            acl:
              deny_labels:
                project: [apisix, tomcat]
          upstream: *fixture_upstream
      consumers: *consumers
    fixtures: [*hello_fixture]
    steps:
      - name: jack-forbidden
        input:
          path: /hello
          headers:
            Authorization: Basic amFjazoxMjM0NTY=
        output: *acl_forbidden
      - name: rose-forbidden
        input:
          path: /hello
          headers:
            Authorization: Basic cm9zZToxMjM0NTY=
        output: *acl_forbidden

  - name: preserve-comma-in-label-value
    source:
      file: t/plugin/acl.t
      tests: [16, 17, 18]
    runtime: *consumer_runtime
    config:
      routes:
        - id: acl-comma-label
          uri: /hello
          plugins:
            basic-auth: {}
            acl:
              allow_labels:
                project: ["http,server"]
          upstream: *fixture_upstream
      consumers: *consumers
    fixtures: [*hello_fixture]
    steps:
      - name: jack-forbidden
        input:
          path: /hello
          headers:
            Authorization: Basic amFjazoxMjM0NTY=
        output: *acl_forbidden
      - name: rose-allowed
        input:
          path: /hello
          headers:
            Authorization: Basic cm9zZToxMjM0NTY=
        output: *hello_output

  - name: external-user-query-values
    source:
      file: t/plugin/acl.t
      tests: [19, 20, 21, 22]
    runtime: &external_runtime
      plugins: [acl, serverless-pre-function]
    config:
      routes:
        - id: acl-external-query
          uri: /hello
          plugins:
            serverless-pre-function:
              phase: access
              functions:
                - >-
                  return function(conf, ctx)
                    local teams = {}
                    for team in string.gmatch(ctx.var.request_uri, "team=([^&]+)") do
                      table.insert(teams, team)
                    end
                    ctx.external_user = { team = teams }
                  end
            acl:
              external_user_label_field: team
              allow_labels:
                team: [cloud, infra, devops, qa]
          upstream: *fixture_upstream
    fixtures: [*hello_fixture]
    steps:
      - name: infra-allowed
        input:
          path: /hello?team=infra
        output: *hello_output
      - name: one-matching-team-allowed
        input:
          path: /hello?team=infra&team=fake
        output: *hello_output
      - name: fake-forbidden
        input:
          path: /hello?team=fake
        output: *acl_forbidden

  - name: external-user-table-parser
    source:
      file: t/plugin/acl.t
      tests: [23, 24]
    runtime: *external_runtime
    config:
      routes:
        - id: acl-external-table
          uri: /hello
          plugins:
            serverless-pre-function:
              phase: access
              functions:
                - 'return function(conf, ctx) ctx.external_user = { orgs = { api7 = { team = {"cloud", "infra"} } } } end'
            acl:
              allow_labels:
                org: [api7, apache]
                team: [cloud, infra]
              external_user_label_field: $.orgs..team
              external_user_label_field_key: team
              external_user_label_field_parser: table
              rejected_code: 403
          upstream: &single_fixture_upstream
            type: roundrobin
            nodes:
              "{{UPSTREAM_ADDR}}": 1
    upstream: &hello_upstream
      respond:
        status: 200
        body: hello world
    input:
      path: /hello
    output: *hello_output

  - name: external-user-segmented-text-parser
    source:
      file: t/plugin/acl.t
      tests: [25, 26]
    runtime: *external_runtime
    config:
      routes:
        - id: acl-external-segmented
          uri: /hello
          plugins:
            serverless-pre-function:
              phase: access
              functions:
                - 'return function(conf, ctx) ctx.external_user = { orgs = { api7 = { team = "cloud|infra" } } } end'
            acl:
              allow_labels:
                org: [api7, apache]
                team: [cloud, infra]
              external_user_label_field: $.orgs..team
              external_user_label_field_key: team
              external_user_label_field_parser: segmented_text
              external_user_label_field_separator: '\|'
              rejected_code: 403
          upstream: *single_fixture_upstream
    upstream: *hello_upstream
    input:
      path: /hello
    output: *hello_output

  - name: external-user-json-parser
    source:
      file: t/plugin/acl.t
      tests: [27, 28]
    runtime: *external_runtime
    config:
      routes:
        - id: acl-external-json
          uri: /hello
          plugins:
            serverless-pre-function:
              phase: access
              functions:
                - 'return function(conf, ctx) ctx.external_user = { orgs = { api7 = { team = "[\"cloud\", \"infra\"]" } } } end'
            acl:
              allow_labels:
                org: [api7, apache]
                team: [cloud, infra]
              external_user_label_field: $..team
              external_user_label_field_key: team
              external_user_label_field_parser: json
              rejected_code: 403
          upstream: *single_fixture_upstream
    upstream: *hello_upstream
    input:
      path: /hello
    output: *hello_output

  - name: segmented-text-invalid-separator-does-not-match
    source:
      file: t/plugin/acl.t
      tests: [29, 30]
    runtime: *external_runtime
    config:
      routes:
        - id: acl-external-separator-literal
          uri: /hello
          plugins:
            serverless-pre-function:
              phase: access
              functions:
                - 'return function(conf, ctx) ctx.external_user = { orgs = { api7 = { team = "cloud|infra" } } } end'
            acl:
              allow_labels:
                org: [api7, apache]
                team: [cloud, infra]
              external_user_label_field: $.orgs..team
              external_user_label_field_key: team
              external_user_label_field_parser: segmented_text
              external_user_label_field_separator: '|'
              rejected_code: 403
          upstream: *single_fixture_upstream
    upstream: *hello_upstream
    input:
      path: /hello
    output: *acl_forbidden

  - name: external-user-multiple-jsonpath-values
    source:
      file: t/plugin/acl.t
      tests: [31, 32]
    runtime: *external_runtime
    config:
      routes:
        - id: acl-external-multiple
          uri: /hello
          plugins:
            serverless-pre-function:
              phase: access
              functions:
                - 'return function(conf, ctx) ctx.external_user = { orgs = { api7 = { team = "cloud|infra" }, apache = { team = {"devops", "qa"} } } } end'
            acl:
              allow_labels:
                org: [api7, apache]
                team: [cloud, infra]
              external_user_label_field: $.orgs..team
              external_user_label_field_key: team
              external_user_label_field_parser: segmented_text
              external_user_label_field_separator: '\|'
              rejected_code: 403
          upstream: *single_fixture_upstream
    upstream: *hello_upstream
    input:
      path: /hello
    output: *hello_output

  - name: jsonpath-without-parser
    source:
      file: t/plugin/acl.t
      tests: [33, 34]
    runtime: *external_runtime
    config:
      routes:
        - id: acl-external-no-parser
          uri: /hello
          plugins:
            serverless-pre-function:
              phase: access
              functions:
                - 'return function(conf, ctx) ctx.external_user = { orgs = { api7 = { team = "cloud,infra" } } } end'
            acl:
              allow_labels:
                org: [api7, apache]
                team: [cloud, infra]
              external_user_label_field: $..team
              rejected_code: 403
          upstream: *single_fixture_upstream
    upstream: *hello_upstream
    input:
      path: /hello
    output: *acl_forbidden

  - name: invalid-separator-pattern
    source:
      file: t/plugin/acl.t
      tests: [35, 36]
    runtime: *external_runtime
    config:
      routes:
        - id: acl-external-invalid-pattern
          uri: /hello
          plugins:
            serverless-pre-function:
              phase: access
              functions:
                - 'return function(conf, ctx) ctx.external_user = { orgs = { api7 = { team = "cloud,infra" } } } end'
            acl:
              allow_labels:
                org: [api7, apache]
                team: [cloud, infra]
              external_user_label_field: $..team
              external_user_label_field_key: team
              external_user_label_field_parser: segmented_text
              external_user_label_field_separator: (invalid(pattern
              rejected_code: 403
          upstream: *single_fixture_upstream
    upstream: *hello_upstream
    input:
      path: /hello
    output:
      status: 403
      body:
        matches: 'The consumer is forbidden\.'

  - name: table-parser-rejects-string
    source:
      file: t/plugin/acl.t
      tests: [37, 38]
    runtime: *external_runtime
    config:
      routes:
        - id: acl-external-table-string
          uri: /hello
          plugins:
            serverless-pre-function:
              phase: access
              functions:
                - 'return function(conf, ctx) ctx.external_user = { orgs = { api7 = { team = "cloud,infra" } } } end'
            acl:
              allow_labels:
                org: [api7, apache]
                team: [cloud, infra]
              external_user_label_field: $..team
              external_user_label_field_key: team
              external_user_label_field_parser: table
              rejected_code: 403
          upstream: *single_fixture_upstream
    upstream: *hello_upstream
    input:
      path: /hello
    output: *acl_forbidden

  - name: json-parser-rejects-table
    source:
      file: t/plugin/acl.t
      tests: [39, 40]
    runtime: *external_runtime
    config:
      routes:
        - id: acl-external-json-table
          uri: /hello
          plugins:
            serverless-pre-function:
              phase: access
              functions:
                - 'return function(conf, ctx) ctx.external_user = { orgs = { api7 = { team = {"cloud", "infra"} } } } end'
            acl:
              allow_labels:
                org: [api7, apache]
                team: [cloud, infra]
              external_user_label_field: $..team
              external_user_label_field_key: team
              external_user_label_field_parser: json
              rejected_code: 403
          upstream: *single_fixture_upstream
    upstream: *hello_upstream
    input:
      path: /hello
    output: *acl_forbidden

  - name: json-parser-requires-array-prefix
    source:
      file: t/plugin/acl.t
      tests: [41, 42]
    runtime: *external_runtime
    config:
      routes:
        - id: acl-external-json-scalar
          uri: /hello
          plugins:
            serverless-pre-function:
              phase: access
              functions:
                - 'return function(conf, ctx) ctx.external_user = { orgs = { api7 = { team = "cloud" } } } end'
            acl:
              allow_labels:
                org: [api7, apache]
                team: [cloud, infra]
              external_user_label_field: $..team
              external_user_label_field_key: team
              external_user_label_field_parser: json
              rejected_code: 403
          upstream: *single_fixture_upstream
    upstream: *hello_upstream
    input:
      path: /hello
