  - name: json-parser-rejects-invalid-json
    source:
      file: t/plugin/acl.t
      tests: [43, 44]
    runtime: *external_runtime
    config:
      routes:
        - id: acl-external-json-invalid
          uri: /hello
          plugins:
            serverless-pre-function:
              phase: access
              functions:
                - 'return function(conf, ctx) ctx.external_user = { orgs = { api7 = { team = "[cloud" } } } end'
            acl:
              allow_labels:
                org: [api7, apache]
                team: [cloud, infra]
              external_user_label_field: $..team
              external_user_label_field_key: team
              external_user_label_field_parser: json
              rejected_code: 403
          upstream: *single_fixture_upstream
    upstream: *hello_upstream
    input:
      path: /hello
    output: *acl_forbidden

  - name: default-parser-single-value
    source:
      file: t/plugin/acl.t
      tests: [45, 46]
    runtime: *external_runtime
    config:
      routes:
        - id: acl-external-default-parser
          uri: /hello
          plugins:
            serverless-pre-function:
              phase: access
              functions:
                - 'return function(conf, ctx) ctx.external_user = { team = "cloud" } end'
            acl:
              allow_labels:
                org: [api7, apache]
                team: [cloud, infra]
              external_user_label_field: team
              rejected_code: 403
          upstream: *single_fixture_upstream
    upstream: *hello_upstream
    input:
      path: /hello
    output: *hello_output

  - name: schema-rejections
    source:
      file: t/plugin/acl.t
      tests: [47, 48, 49, 50, 51, 52, 53]
    variants:
      - name: invalid-parser
        runtime: &acl_runtime
          plugins: [acl]
        config:
          routes:
            - id: acl-schema-invalid-parser
              uri: /hello
              plugins:
                acl:
                  allow_labels: &schema_labels
                    team: [cloud, infra]
                  external_user_label_field: team
                  external_user_label_field_parser: an-invalid-parser
        input: &hello_input
          path: /hello
        output: &schema_rejected
          status: 404
          logs:
            matches: 'build route acl-schema-.*fail:.*acl'
      - name: segmented-parser-missing-separator
        runtime: *acl_runtime
        config:
          routes:
            - id: acl-schema-missing-separator
              uri: /hello
              plugins:
                acl:
                  allow_labels: *schema_labels
                  external_user_label_field: team
                  external_user_label_field_parser: segmented_text
        input: *hello_input
        output: *schema_rejected
      - name: empty-field-key
        runtime: *acl_runtime
        config:
          routes:
            - id: acl-schema-empty-key
              uri: /hello
              plugins:
                acl:
                  allow_labels: *schema_labels
                  external_user_label_field: team
                  external_user_label_field_parser: segmented_text
                  external_user_label_field_key: ""
        input: *hello_input
        output: *schema_rejected
      - name: separator-object-instead-of-key
        runtime: *acl_runtime
        config:
          routes:
            - id: acl-schema-key-type
              uri: /hello
              plugins:
                acl:
                  allow_labels: *schema_labels
                  external_user_label_field: team
                  external_user_label_field_parser: segmented_text
                  external_user_label_separator: {}
        input: *hello_input
        output: *schema_rejected
      - name: empty-separator
        runtime: *acl_runtime
        config:
          routes:
            - id: acl-schema-empty-separator
              uri: /hello
              plugins:
                acl:
                  allow_labels: *schema_labels
                  external_user_label_field: team
                  external_user_label_field_parser: segmented_text
                  external_user_label_field_separator: ""
        input: *hello_input
        output: *schema_rejected
      - name: separator-not-string
        runtime: *acl_runtime
        config:
          routes:
            - id: acl-schema-separator-type
              uri: /hello
              plugins:
                acl:
                  allow_labels: *schema_labels
                  external_user_label_field: team
                  external_user_label_field_parser: segmented_text
                  external_user_label_field_separator: {}
        input: *hello_input
        output: *schema_rejected
      - name: invalid-jsonpath
        runtime: *acl_runtime
        config:
          routes:
            - id: acl-schema-invalid-jsonpath
              uri: /hello
              plugins:
                acl:
                  allow_labels:
                    team: [cloud]
                  external_user_label_field: $..([invalid
        input: *hello_input
        output: *schema_rejected

  - name: multi-match-parser-deny
    source:
      file: t/plugin/acl.t
      tests: [54, 55, 56, 57, 58]
    runtime: *external_runtime
    config:
      routes:
        - id: acl-external-multi-match-deny
          uri: /hello
          plugins:
            serverless-pre-function:
              phase: access
              functions:
                - 'return function(conf, ctx) ctx.external_user = { teams = { { name = "cloud" }, { name = "infra,qa" } } } end'
            acl:
              deny_labels:
                name: [infra]
              external_user_label_field: $..name
              external_user_label_field_key: name
              external_user_label_field_parser: segmented_text
              external_user_label_field_separator: ','
              rejected_code: 403
          upstream: *single_fixture_upstream
    upstream: *hello_upstream
    input:
      path: /hello
    output: *acl_forbidden

  - name: comma-delimited-consumer-labels
    source:
      file: t/plugin/acl2.t
      tests: [1, 2, 3, 4]
    runtime: *consumer_runtime
    config:
      routes:
        - id: acl2-comma-delimited
          uri: /hello
          plugins:
            basic-auth: {}
            acl:
              allow_labels:
                project: [apisix]
          upstream: *fixture_upstream
      consumers:
        - username: jack
          labels:
            org: apache
            project: gateway,apisix,web-server
          plugins:
            basic-auth:
              username: jack
              password: "123456"
    fixtures: [*hello_fixture]
    steps:
      - name: unauthorized
        input:
          path: /hello
        output: *missing_basic_auth
      - name: jack-allowed
        input:
          path: /hello
          headers:
            Authorization: Basic amFjazoxMjM0NTY=
        output: *hello_output
