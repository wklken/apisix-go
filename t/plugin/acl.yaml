    - 4
  config:
    routes:
    - uri: /hello
      upstream:
        type: roundrobin
        nodes:
          '{{UPSTREAM_ADDR}}': 1
      plugins:
        basic-auth: {}
        acl:
          allow_labels:
            org:
            - apache
      id: acl-3
    consumers:
    - username: jack
      plugins:
        basic-auth:
          username: jack
          password: '123456'
      labels:
        org: apache
        project: gateway,apisix,web-server
    - username: rose
      plugins:
        basic-auth:
          username: rose
          password: '123456'
      labels:
        org: '["opensource","apache"]'
        project: '["tomcat","web-server","http,server"]'
  input:
    method: GET
    path: /hello
  upstream:
    respond:
      status: 200
      body: hello world
  output:
    status: 401
    body:
      equals: '{"message":"Missing authorization in request"}'
