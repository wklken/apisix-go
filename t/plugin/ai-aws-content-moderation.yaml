cases:
    - config:
        routes:
            - id: ai-aws-content-moderation-source-1
              plugins:
                ai-aws-content-moderation:
                    comprehend:
                        access_key_id: integration
                        endpoint: '{{FIXTURE.sink.URL}}'
                        region: us-east-1
                        secret_access_key: integration
              upstream:
                nodes:
                    '{{FIXTURE.primary.ADDR}}': 1
                type: roundrobin
              uri: /v1/chat/completions
      fixtures:
        - kind: http
          name: primary
          respond:
            - body: hello world
              headers: {}
              status: 200
        - kind: http
          name: sink
          expect:
            - method: POST
              path: {equals: /}
              headers:
                X-Amz-Target: {equals: Comprehend_20171127.DetectToxicContent}
              body: {matches: 'TextSegments'}
          respond:
            - body: '{"ResultList":[{"Toxicity":0,"Labels":[]}]}'
              headers: {}
              status: 200
      name: ai-aws-content-moderation-source-1
      source:
        file: t/plugin/ai-aws-content-moderation-secrets.t
        tests:
            - 1
            - 2
            - 3
            - 4
            - 5
      steps:
        - input:
            body: '{"model":"integration","messages":[{"role":"user","content":"hello"}]}'
            headers:
                Content-Type: application/json
            method: POST
            path: /v1/chat/completions
          name: moderation-request-is-signed-and-forwarded
          output:
            body:
                equals: hello world
            status: 200
