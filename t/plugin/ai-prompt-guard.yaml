    steps:
      - name: ai-prompt-guard-001-wrong-regex-should-fail-validation
        input:
          method: GET
          path: "/hello"
        output:
          status: 400
          body:
            matches: "validation failed"
      - name: ai-prompt-guard-002-setup-route-with-both-allow-and-deny-with-match-all-roles
        input:
          method: GET
          path: "/hello"
        output:
          status: 200
          body:
            equals: "hello world"
      - name: ai-prompt-guard-003-send-request-with-good-word
        input:
          method: GET
          path: "/hello"
          body: "{\n    \"messages\": [\n        { \"role\": \"system\", \"content\": \"goodword\" }\n    ]\n}"
        output:
          status: 200
          body:
