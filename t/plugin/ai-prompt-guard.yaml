      - name: ai-prompt-guard-004-send-request-with-bad-word
        input:
          method: GET
          path: "/hello"
          body: "{\n    \"messages\": [\n        { \"role\": \"system\", \"content\": \"badword\" }\n    ]\n}"
        output:
          status: 400
