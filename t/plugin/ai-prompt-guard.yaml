      - name: ai-prompt-guard-006-send-request-with-good-word
        input:
          method: GET
          path: "/hello"
          body: "{\n    \"messages\": [\n        { \"role\": \"system\", \"content\": \"goodword\" }\n    ]\n}"
        output:
          status: 200
          body:
