cases:
    - config:
        routes:
            - id: ai-rate-limiting-source-1
              plugins:
                ai-rate-limiting:
                    rules:
                        - count: 10
                          key: ${remote_addr}
                          time_window: 60
              upstream:
                nodes:
                    '{{FIXTURE.primary.ADDR}}': 1
                type: roundrobin
              uri: /v1/chat/completions
      fixtures:
        - kind: http
          name: primary
          respond:
            - body: hello world
              headers: {}
              status: 200
      name: ai-rate-limiting-source-1
      source:
        file: t/plugin/ai-rate-limiting-consumer-isolation.t
        tests:
            - 1
            - 2
            - 3
            - 4
            - 5
      steps:
        - input:
            body: '{"model":"integration","messages":[{"role":"user","content":"hello"}]}'
            headers:
                Content-Type: application/json
            method: POST
            path: /v1/chat/completions
          name: real-ai-plugin-request
          output:
            body:
                equals: hello world
            status: 200
