- name: test-005-verify-missing-authorization
  source:
    file: t/plugin/basic-auth.t
    tests:
    - 5
  config:
    routes:
    - plugins:
        basic-auth: {}
      upstream:
        nodes:
          '{{UPSTREAM_ADDR}}': 1
        type: roundrobin
      uri: /hello
      id: basic-auth-4
    consumers:
    - username: foo
      plugins:
        basic-auth:
          username: foo
          password: bar
  input:
    method: GET
    path: /hello
  upstream:
    respond:
      status: 200
      body: hello world
  output:
    status: 401
    body:
      equals: '{"message":"Missing authorization in request"}'
- name: test-006-verify-invalid-basic-authorization-header
  source:
    file: t/plugin/basic-auth.t
