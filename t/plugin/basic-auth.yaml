    steps:
      - name: basic-auth-realm-001-sanity-default-realm
        input:
          method: GET
          path: "/hello"
        output:
          status: 200
          body:
            equals: "hello world"
      - name: basic-auth-realm-002-verify-default-realm
        input:
          method: GET
          path: "/hello"
        output:
          status: 401
          body:
            equals: "validation failed"
          headers:
            WWW-Authenticate:
              equals: "Basic realm=\"basic\""
      - name: basic-auth-realm-003-set-custom-realm
        input:
          method: GET
          path: "/hello"
        output:
          status: 200
          body:
            equals: "hello world"
      - name: basic-auth-realm-004-verify-custom-realm
        input:
          method: GET
          path: "/hello"
        output:
          status: 401
          body:
            equals: "validation failed"
          headers:
            WWW-Authenticate:
              equals: "Basic realm=\"secure-zone\""
      - name: basic-auth-realm-005-set-anonymous-consumer
        input:
          method: GET
          path: "/hello"
        output:
          status: 200
          body:
            equals: "hello world"
      - name: basic-auth-realm-006-verify-anonymous-consumer-missing-returns-realm
        input:
          method: GET
          path: "/hello"
        output:
          status: 401
          body:
            equals: "validation failed"
          headers:
