        - 3
        - 4
        - 5
    config:
      routes:
        - id: batch-requests-grpc-corpus
          uri: "/*"
          upstream:
            type: roundrobin
            nodes:
              "{{FIXTURE.primary.ADDR}}": 1
    fixtures:
      - name: primary
        kind: http
        respond:
          - status: 200
            headers: {}
            body: "hello world"
          - status: 200
            headers: {}
            body: "hello world"
          - status: 200
            headers: {}
            body: "hello world"
          - status: 200
            headers: {}
            body: "hello world"
          - status: 200
            headers: {}
            body: "hello world"
    steps:
      - name: batch-requests-grpc-001-pre-create-public-api-route
        input:
          method: GET
          path: "/apisix/batch-requests"
        output:
          status: 200
          body:
            equals: "hello world"
      - name: batch-requests-grpc-002-set-proto-id-1
        input:
          method: GET
          path: "/apisix/batch-requests"
        output:
          status: 200
          body:
            equals: "hello world"
      - name: batch-requests-grpc-003-set-routes-id-2
        input:
          method: GET
          path: "/grpctest"
        output:
          status: 200
          body:
            equals: "hello world"
      - name: batch-requests-grpc-004-hit-route
        input:
          method: GET
          path: "/grpctest?name=world"
        output:
          status: 200
          body:
            matches: "hello world"
      - name: batch-requests-grpc-005-successful-batch-requests-for-both-grpc-and-http
        input:
          method: GET
          path: "/aggregate"
        output:
          status: 200
          body:
            equals: "hello world"
