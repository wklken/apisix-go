              equals: br
            Etag:
              equals: "W/\"123456789\""
            Last-Modified:
              equals: "Thu, 27 Nov 2025 00:32:33 GMT"
      - name: brotli-037-etag-with-embedded-quotes-is-non-standard-clear-it
