    steps:
      - name: brotli-001-sanity
        input:
          method: GET
          path: "/echo"
        output:
          status: 200
          body:
            equals: "hello world"
      - name: brotli-002-hit-single-accept-encoding
        input:
          method: GET
          path: "/echo"
          body: "0123456789\n012345678"
          headers:
            Accept-Encoding: br
            Content-Type: text/html
        output:
          status: 200
          body:
            equals: "hello world"
          headers:
            Content-Encoding:
              equals: br
      - name: brotli-003-hit-single-wildcard-accept-encoding
        input:
          method: GET
          path: "/echo"
          body: "0123456789\n012345678"
          headers:
            Accept-Encoding: "*"
            Content-Type: text/html
        output:
          status: 200
          body:
            equals: "hello world"
          headers:
            Content-Encoding:
              equals: br
      - name: brotli-004-not-hit-single-accept-encoding
        input:
          method: GET
          path: "/echo"
          body: "0123456789\n012345678"
          headers:
            Accept-Encoding: gzip
            Content-Type: text/html
        output:
          status: 200
          body:
            equals: "hello world"
      - name: brotli-005-hit-br-in-multi-accept-encoding
        input:
          method: GET
          path: "/echo"
          body: "0123456789\n012345678"
          headers:
            Accept-Encoding: "gzip, br"
            Content-Type: text/html
        output:
          status: 200
          body:
            equals: "hello world"
          headers:
            Content-Encoding:
              equals: br
      - name: brotli-006-hit-no-br-in-multi-accept-encoding-but-wildcard
        input:
          method: GET
          path: "/echo"
          body: "0123456789\n012345678"
          headers:
            Accept-Encoding: "gzip, *"
            Content-Type: text/html
        output:
          status: 200
          body:
            equals: "hello world"
          headers:
            Content-Encoding:
              equals: br
      - name: brotli-007-not-hit-no-br-in-multi-accept-encoding
        input:
          method: GET
          path: "/echo"
          body: "0123456789\n012345678"
          headers:
            Accept-Encoding: "gzip, deflate"
            Content-Type: text/html
        output:
          status: 200
          body:
            equals: "hello world"
      - name: brotli-008-hit-multi-accept-encoding-with-quality
        input:
          method: GET
          path: "/echo"
          body: "0123456789\n012345678"
          headers:
            Accept-Encoding: "gzip;q=0.5, br;q=0.6"
            Content-Type: text/html
        output:
          status: 200
          body:
            equals: "hello world"
          headers:
            Content-Encoding:
              equals: br
      - name: brotli-009-not-hit-multi-accept-encoding-with-quality-and-disable-br
        input:
          method: GET
          path: "/echo"
          body: "0123456789\n012345678"
          headers:
            Accept-Encoding: "gzip;q=0.5, br;q=0"
            Content-Type: text/html
        output:
          status: 200
          body:
            equals: "hello world"
      - name: brotli-010-hit-multi-accept-encoding-with-quality-and-wildcard
        input:
          method: GET
          path: "/echo"
          body: "0123456789\n012345678"
          headers:
            Accept-Encoding: "gzip;q=0.8, deflate, sdch;q=0.6, *;q=0.1"
            Content-Type: text/html
        output:
          status: 200
          body:
            equals: "hello world"
          headers:
            Content-Encoding:
              equals: br
      - name: brotli-011-default-buffers-and-compress-level
        input:
          method: GET
          path: "/echo"
        output:
          status: 200
          body:
