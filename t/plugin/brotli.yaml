          method: GET
          path: "/echo"
          body: "0123456789\n012345678"
          headers:
            Accept-Encoding: br
            Content-Type: text/html
            Etag: "\"12\"34\""
        output:
          status: 200
          body:
            equals: "hello world"
          headers:
            Content-Encoding:
              equals: br
