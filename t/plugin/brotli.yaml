              equals: br
            Etag:
              equals: "W/\"123456789\""
      - name: brotli-036-last-modified-do-nothing
        input:
          method: GET
          path: "/echo"
          body: "0123456789\n012345678"
          headers:
            Accept-Encoding: br
            Content-Type: text/html
            Etag: "\"123456789\""
            Last-Modified: "Thu, 27 Nov 2025 00:32:33 GMT"
        output:
