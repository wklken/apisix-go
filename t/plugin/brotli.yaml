      - name: brotli-031-hit-skip-brotli-compression-of-compressed-upstream-response
        input:
          method: GET
          path: "/mock_compressed_upstream_response"
          headers:
            Accept-Encoding: "gzip, br"
            Vary: upstream
            Content-Type: text/html
        output:
          status: 200
