      - name: brotli-032-etag
        input:
          method: GET
          path: "/echo"
        output:
          status: 200
          body:
            equals: "hello world"
      - name: brotli-033-not-standard-etag-clear-it
        input:
          method: GET
          path: "/echo"
          body: "0123456789\n012345678"
          headers:
            Accept-Encoding: br
            Content-Type: text/html
            Etag: "123456789"
        output:
          status: 200
          body:
            equals: "hello world"
          headers:
            Content-Encoding:
              equals: br
      - name: brotli-034-weak-etag-keep-it
        input:
          method: GET
          path: "/echo"
          body: "0123456789\n012345678"
          headers:
            Accept-Encoding: br
            Content-Type: text/html
            Etag: "W/\"123456789\""
        output:
          status: 200
          body:
            equals: "hello world"
          headers:
            Content-Encoding:
              equals: br
            Etag:
              equals: "W/\"123456789\""
      - name: brotli-035-strong-etag-downgrade-it
        input:
          method: GET
          path: "/echo"
          body: "0123456789\n012345678"
          headers:
            Accept-Encoding: br
            Content-Type: text/html
            Etag: "\"123456789\""
        output:
