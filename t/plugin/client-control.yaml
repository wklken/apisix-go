    - 2
  config:
    routes:
    - uri: /hello
      upstream:
        type: roundrobin
        nodes:
          '{{UPSTREAM_ADDR}}': 1
      plugins:
        client-control:
          max_body_size: 5
      id: client-control-1
  input:
    method: POST
    path: /hello
    body: '123456'
  upstream:
    respond:
      status: 200
      body: hello world
  output:
    status: 413
