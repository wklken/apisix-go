        hmac-auth:
          key_id: my-access-key
          secret_key: my-secret-key
        consumer-restriction:
          type: route_id
          blacklist:
          - '1'
          rejected_code: 401
    - username: jack1
      plugins:
        basic-auth:
          username: jack2019
          password: '123456'
