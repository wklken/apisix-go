sources:
  - {repository: https://github.com/apache/apisix, commit: c3d7d5ec69774121f53d2e20d29d09c816795dd7, file: t/plugin/cors.t, tests: 37}
  - {repository: https://github.com/apache/apisix, commit: c3d7d5ec69774121f53d2e20d29d09c816795dd7, file: t/plugin/cors2.t, tests: 5}
  - {repository: https://github.com/apache/apisix, commit: c3d7d5ec69774121f53d2e20d29d09c816795dd7, file: t/plugin/cors3.t, tests: 15}
  - {repository: https://github.com/apache/apisix, commit: c3d7d5ec69774121f53d2e20d29d09c816795dd7, file: t/plugin/cors4.t, tests: 29}
cases:
  - name: default-wildcard
    source: {file: t/plugin/cors.t, tests: [6, 7]}
    config:
      routes:
        - id: cors-default
          uri: /hello
          methods: [GET]
          plugins: {cors: {}}
          upstream: {type: roundrobin, nodes: {"{{FIXTURE.primary.ADDR}}": 1}}
    fixtures:
      - name: primary
        kind: http
        respond: [{status: 200, body: hello world}]
    steps:
      - {name: no-origin, input: {method: GET, path: /hello}, output: {status: 200, body: {equals: hello world}, headers: {Access-Control-Allow-Origin: {equals: '*'}, Access-Control-Allow-Methods: {equals: '*'}, Access-Control-Allow-Headers: {equals: '*'}, Access-Control-Expose-Headers: {absent: true}, Access-Control-Max-Age: {equals: '5'}}}}

  - name: base-schema
    source: {file: t/plugin/cors.t, tests: [1, 2]}
    variants:
      - name: accepted-explicit-config
        config:
          routes:
            - id: cors-base-schema-valid
              uri: /hello
              plugins: {cors: {allow_origins: http://test.com, allow_methods: '', allow_headers: '', expose_headers: '', max_age: 600, allow_credential: true}}
              upstream: {type: roundrobin, nodes: {"{{UPSTREAM_ADDR}}": 1}}
        upstream: {respond: {status: 200, body: hello world}}
        input: {method: GET, path: /hello}
        output: {status: 200, body: {equals: hello world}}
      - name: reject-string-max-age
        config: {routes: [{id: cors-base-schema-invalid, uri: /hello, plugins: {cors: {allow_origins: http://test.com, allow_methods: '', allow_headers: '', expose_headers: '', max_age: '600', allow_credential: true}}, upstream: {type: roundrobin, nodes: {127.0.0.1:1980: 1}}}]}
        input: {method: GET, path: /hello}
        output: {status: 404, logs: {matches: 'max_age.*expected integer'}}

  - name: add-default-plugin
    source: {file: t/plugin/cors.t, tests: [3]}
    config:
      routes:
        - id: cors-added-plugin
          uri: /hello
          plugins: {cors: {}}
          upstream: {type: roundrobin, nodes: {"{{FIXTURE.primary.ADDR}}": 1}}
    fixtures: [{name: primary, kind: http, respond: [{status: 200, body: hello world}]}]
    steps:
      - {name: plugin-is-active, input: {method: GET, path: /hello}, output: {status: 200, body: {equals: hello world}, headers: {Access-Control-Allow-Origin: {equals: '*'}, Access-Control-Allow-Methods: {equals: '*'}, Access-Control-Allow-Headers: {equals: '*'}, Access-Control-Expose-Headers: {absent: true}, Access-Control-Max-Age: {equals: '5'}}}}

  - name: update-plugin-accepts-unknown-field
    source: {file: t/plugin/cors.t, tests: [4]}
    config:
      routes:
        - id: cors-updated-plugin
          uri: /hello
          plugins: {cors: {allow_origins: '**', allow_methods: '**', allow_headers: request-h, expose_headers: expose-h, madx_age: 5, allow_credential: true}}
          upstream: {type: roundrobin, nodes: {"{{FIXTURE.primary.ADDR}}": 1}}
    fixtures: [{name: primary, kind: http, respond: [{status: 200, body: hello world}]}]
    steps:
      - {name: updated-config-is-active, input: {method: GET, path: /hello, headers: {Origin: http://sub.domain.com}}, output: {status: 200, body: {equals: hello world}, headers: {Access-Control-Allow-Origin: {equals: http://sub.domain.com}, Access-Control-Allow-Methods: {equals: 'GET,POST,PUT,DELETE,PATCH,HEAD,OPTIONS,CONNECT,TRACE'}, Access-Control-Allow-Headers: {equals: request-h}, Access-Control-Expose-Headers: {equals: expose-h}, Access-Control-Max-Age: {equals: '5'}, Access-Control-Allow-Credentials: {equals: 'true'}}}}

  - name: disable-plugin
    source: {file: t/plugin/cors.t, tests: [5]}
    config:
      routes:
        - id: cors-disabled-plugin
          uri: /hello
          plugins: {cors: {_meta: {disable: true}}}
          upstream: {type: roundrobin, nodes: {"{{FIXTURE.primary.ADDR}}": 1}}
    fixtures: [{name: primary, kind: http, respond: [{status: 200, body: hello world}]}]
    steps:
      - {name: disabled-plugin-does-not-add-cors-headers, input: {method: GET, path: /hello, headers: {Origin: http://sub.domain.com}}, output: {status: 200, body: {equals: hello world}, headers: {Access-Control-Allow-Origin: {absent: true}, Access-Control-Allow-Methods: {absent: true}, Access-Control-Allow-Headers: {absent: true}, Access-Control-Expose-Headers: {absent: true}, Access-Control-Max-Age: {absent: true}, Access-Control-Allow-Credentials: {absent: true}}}}

  - name: overwrite-upstream-cors-headers
    source: {file: t/plugin/cors.t, tests: [17, 18, 19, 20, 21, 22, 23]}
    config:
      routes:
        - id: cors-overwrite-upstream
          uri: /headers
          plugins:
            cors:
              allow_origins: "**"
              allow_methods: "**"
              allow_headers: request-h
              expose_headers: expose-h
              allow_credential: true
          upstream: {type: roundrobin, nodes: {"{{FIXTURE.primary.ADDR}}": 1}}
    fixtures:
      - name: primary
        kind: http
        respond:
          - {status: 200, headers: {Access-Control-Allow-Origin: https://wrong.example}, body: /headers}
          - {status: 200, headers: {Access-Control-Allow-Methods: methods}, body: /headers}
          - {status: 200, headers: {Access-Control-Allow-Headers: a-headers}, body: /headers}
          - {status: 200, headers: {Access-Control-Expose-Headers: e-headers}, body: /headers}
          - {status: 200, headers: {Access-Control-Max-Age: "10"}, body: /headers}
          - {status: 200, headers: {Access-Control-Allow-Credentials: "false"}, body: /headers}
    steps:
      - {name: origin, input: {method: GET, path: /headers, headers: {Origin: https://sub.domain.com}}, output: {status: 200, body: {equals: /headers}, headers: {Access-Control-Allow-Origin: {equals: https://sub.domain.com}}}}
      - {name: methods, input: {method: GET, path: /headers, headers: {Origin: https://sub.domain.com}}, output: {status: 200, body: {equals: /headers}, headers: {Access-Control-Allow-Methods: {equals: "GET,POST,PUT,DELETE,PATCH,HEAD,OPTIONS,CONNECT,TRACE"}}}}
      - {name: request-headers, input: {method: GET, path: /headers, headers: {Origin: https://sub.domain.com}}, output: {status: 200, body: {equals: /headers}, headers: {Access-Control-Allow-Headers: {equals: request-h}}}}
      - {name: expose-headers, input: {method: GET, path: /headers, headers: {Origin: https://sub.domain.com}}, output: {status: 200, body: {equals: /headers}, headers: {Access-Control-Expose-Headers: {equals: expose-h}}}}
      - {name: max-age, input: {method: GET, path: /headers, headers: {Origin: https://sub.domain.com}}, output: {status: 200, body: {equals: /headers}, headers: {Access-Control-Max-Age: {equals: "5"}}}}
      - {name: credentials, input: {method: GET, path: /headers, headers: {Origin: https://sub.domain.com}}, output: {status: 200, body: {equals: /headers}, headers: {Access-Control-Allow-Credentials: {equals: "true"}}}}

  - name: force-wildcard-and-options
    source: {file: t/plugin/cors.t, tests: [11, 12, 13, 14]}
    config:
      routes:
        - id: cors-force-wildcard
          uri: /hello
          plugins:
            cors:
              allow_origins: "**"
              allow_methods: "**"
              allow_headers: "**"
              expose_headers: "*"
              allow_private_network: true
          upstream: {type: roundrobin, nodes: {"{{FIXTURE.primary.ADDR}}": 1}}
    fixtures:
      - name: primary
        kind: http
        respond:
          - {status: 200, body: hello world}
          - {status: 200, body: hello world}
    steps:
      - {name: origin-and-request-headers, input: {method: GET, path: /hello, headers: {Origin: https://sub.domain.com, Access-Control-Request-Headers: "req-header1,req-header2"}}, output: {status: 200, body: {equals: hello world}, headers: {Access-Control-Allow-Origin: {equals: https://sub.domain.com}, Access-Control-Allow-Methods: {equals: "GET,POST,PUT,DELETE,PATCH,HEAD,OPTIONS,CONNECT,TRACE"}, Access-Control-Allow-Headers: {equals: "req-header1,req-header2"}, Access-Control-Expose-Headers: {equals: '*'}, Access-Control-Max-Age: {equals: '5'}}}}
      - {name: no-origin, input: {method: GET, path: /hello}, output: {status: 200, body: {equals: hello world}, headers: {Access-Control-Allow-Origin: {equals: '*'}, Access-Control-Allow-Methods: {equals: "GET,POST,PUT,DELETE,PATCH,HEAD,OPTIONS,CONNECT,TRACE"}, Access-Control-Allow-Headers: {absent: true}, Access-Control-Expose-Headers: {equals: '*'}, Access-Control-Max-Age: {equals: '5'}}}}
      - {name: options-without-origin, input: {method: OPTIONS, path: /hello}, output: {status: 200, body: {equals: ''}}}
      - {name: private-network-preflight, input: {method: OPTIONS, path: /hello, headers: {Origin: https://sub.domain.com, Access-Control-Request-Method: GET, Access-Control-Request-Headers: "req-header1,req-header2", Access-Control-Request-Private-Network: 'true'}}, output: {status: 200, body: {equals: ''}, headers: {Access-Control-Allow-Origin: {equals: https://sub.domain.com}, Access-Control-Allow-Methods: {equals: "GET,POST,PUT,DELETE,PATCH,HEAD,OPTIONS,CONNECT,TRACE"}, Access-Control-Allow-Headers: {equals: "req-header1,req-header2"}, Access-Control-Allow-Private-Network: {equals: 'true'}, Access-Control-Max-Age: {equals: '5'}}}}
  - name: explicit-credentials
    source: {file: t/plugin/cors.t, tests: [8, 9, 10]}
    config:
      routes:
        - id: cors-credentials
          uri: /hello
          plugins:
            cors:
              allow_origins: http://sub.domain.com,http://sub2.domain.com
              allow_methods: GET,POST
              allow_headers: headr1,headr2
              expose_headers: ex-headr1,ex-headr2
              max_age: 50
              allow_credential: true
          upstream: {type: roundrobin, nodes: {"{{FIXTURE.primary.ADDR}}": 1}}
    fixtures:
      - name: primary
        kind: http
        respond: [{status: 200, headers: {Vary: Via}, body: hello world}]
    steps:
      - {name: allowed, input: {method: GET, path: /hello, headers: {Origin: http://sub2.domain.com}}, output: {status: 200, body: {equals: hello world}, headers: {Access-Control-Allow-Origin: {equals: http://sub2.domain.com}, Vary: {equals: "Via, Origin"}, Access-Control-Allow-Methods: {equals: "GET,POST"}, Access-Control-Allow-Headers: {equals: "headr1,headr2"}, Access-Control-Expose-Headers: {equals: "ex-headr1,ex-headr2"}, Access-Control-Max-Age: {equals: '50'}, Access-Control-Allow-Credentials: {equals: 'true'}}}}
      - {name: disallowed, input: {method: GET, path: /hello, headers: {Origin: http://sub3.domain.com}}, output: {status: 200, body: {equals: hello world}, headers: {Access-Control-Allow-Origin: {absent: true}, Access-Control-Allow-Methods: {absent: true}, Access-Control-Allow-Headers: {absent: true}, Access-Control-Expose-Headers: {absent: true}, Access-Control-Max-Age: {absent: true}, Access-Control-Allow-Credentials: {absent: true}}}}

  - name: cors-headers-on-key-auth-failure
    source: {file: t/plugin/cors.t, tests: [15, 16]}
    config:
      routes:
        - id: cors-before-key-auth
          uri: /hello
          plugins:
            key-auth: {}
            cors:
              allow_origins: "**"
              allow_methods: "**"
              allow_headers: "*"
              expose_headers: "*"
          upstream: {type: roundrobin, nodes: {127.0.0.1:1980: 1}}
    steps:
      - {name: missing-key-retains-cors-response, input: {method: GET, path: /hello, headers: {Origin: https://sub.domain.com, ExternalHeader1: val, ExternalHeader2: val, ExternalHeader3: val}}, output: {status: 401, body: {equals: '{"message":"Missing API key in request"}'}, headers: {Access-Control-Allow-Origin: {equals: https://sub.domain.com}, Access-Control-Allow-Methods: {equals: "GET,POST,PUT,DELETE,PATCH,HEAD,OPTIONS,CONNECT,TRACE"}, Access-Control-Allow-Headers: {equals: '*'}, Access-Control-Expose-Headers: {equals: '*'}, Access-Control-Max-Age: {equals: '5'}, Access-Control-Allow-Credentials: {absent: true}}}}

  - name: credential-wildcard-rejection
    source: {file: t/plugin/cors.t, tests: [24, 25, 26, 27]}
    variants:
      - name: origins
        config: {routes: [{id: cors-invalid, uri: /hello, plugins: {cors: {allow_origins: '*', allow_credential: true}}, upstream: {type: roundrobin, nodes: {127.0.0.1:1980: 1}}}]}
        input: {method: GET, path: /hello}
        output: {status: 404, logs: {matches: "you can not set '\\*'"}}
      - name: methods
        config: {routes: [{id: cors-invalid, uri: /hello, plugins: {cors: {allow_methods: '*', allow_credential: true}}, upstream: {type: roundrobin, nodes: {127.0.0.1:1980: 1}}}]}
        input: {method: GET, path: /hello}
        output: {status: 404, logs: {matches: "you can not set '\\*'"}}
      - name: headers
        config: {routes: [{id: cors-invalid, uri: /hello, plugins: {cors: {allow_headers: '*', allow_credential: true}}, upstream: {type: roundrobin, nodes: {127.0.0.1:1980: 1}}}]}
        input: {method: GET, path: /hello}
        output: {status: 404, logs: {matches: "you can not set '\\*'"}}
      - name: exposed-headers
        config: {routes: [{id: cors-invalid, uri: /hello, plugins: {cors: {expose_headers: '*', allow_credential: true}}, upstream: {type: roundrobin, nodes: {127.0.0.1:1980: 1}}}]}
        input: {method: GET, path: /hello}
        output: {status: 404, logs: {matches: "you can not set '\\*'"}}

  - name: regex-origins
    source: {file: t/plugin/cors.t, tests: [28, 29, 30]}
    config:
      routes:
        - id: cors-regex
          uri: /hello
          plugins:
            cors:
              allow_origins: http://sub.domain.com,http://sub2.domain.com
              allow_methods: GET,POST
              allow_headers: headr1,headr2
              expose_headers: ex-headr1,ex-headr2
              max_age: 50
              allow_credential: true
              allow_origins_by_regex: ['.*\.test.com$']
          upstream: {type: roundrobin, nodes: {"{{FIXTURE.primary.ADDR}}": 1}}
    fixtures:
      - name: primary
        kind: http
        respond: [{status: 200, headers: {Vary: Via}, body: hello world}]
    steps:
      - {name: regex-match, input: {method: GET, path: /hello, headers: {Origin: http://a.test.com}}, output: {status: 200, body: {equals: hello world}, headers: {Access-Control-Allow-Origin: {equals: http://a.test.com}, Access-Control-Allow-Methods: {equals: "GET,POST"}, Access-Control-Allow-Headers: {equals: "headr1,headr2"}, Access-Control-Expose-Headers: {equals: "ex-headr1,ex-headr2"}, Access-Control-Max-Age: {equals: '50'}, Access-Control-Allow-Credentials: {equals: 'true'}, Vary: {equals: "Via, Origin"}}}}
      - {name: regex-miss, input: {method: GET, path: /hello, headers: {Origin: http://a.test2.com}}, output: {status: 200, body: {equals: hello world}, headers: {Access-Control-Allow-Origin: {absent: true}, Access-Control-Allow-Methods: {absent: true}, Access-Control-Allow-Headers: {absent: true}, Access-Control-Expose-Headers: {absent: true}, Access-Control-Max-Age: {absent: true}, Access-Control-Allow-Credentials: {absent: true}}}}

  - name: multiple-regex-origins
    source: {file: t/plugin/cors.t, tests: [31, 32, 33]}
    config:
      routes:
        - id: cors-multiple-regex
          uri: /hello
          plugins:
            cors:
              allow_origins: http://sub.domain.com,http://sub2.domain.com
              allow_methods: GET,POST
              allow_headers: headr1,headr2
              expose_headers: ex-headr1,ex-headr2
              max_age: 50
              allow_credential: true
              allow_origins_by_regex: ['.*\.test.com$', '.*\.example.org$']
          upstream: {type: roundrobin, nodes: {"{{FIXTURE.primary.ADDR}}": 1}}
    fixtures:
      - name: primary
        kind: http
        respond: [{status: 200, headers: {Vary: Via}, body: hello world}]
    steps:
      - {name: second-regex-match, input: {method: GET, path: /hello, headers: {Origin: http://foo.example.org}}, output: {status: 200, body: {equals: hello world}, headers: {Access-Control-Allow-Origin: {equals: http://foo.example.org}, Access-Control-Allow-Methods: {equals: "GET,POST"}, Access-Control-Allow-Headers: {equals: "headr1,headr2"}, Access-Control-Expose-Headers: {equals: "ex-headr1,ex-headr2"}, Access-Control-Max-Age: {equals: '50'}, Access-Control-Allow-Credentials: {equals: 'true'}, Vary: {equals: "Via, Origin"}}}}
      - {name: no-regex-match, input: {method: GET, path: /hello, headers: {Origin: http://foo.example.com}}, output: {status: 200, body: {equals: hello world}, headers: {Access-Control-Allow-Origin: {absent: true}, Access-Control-Allow-Methods: {absent: true}, Access-Control-Allow-Headers: {absent: true}, Access-Control-Expose-Headers: {absent: true}, Access-Control-Max-Age: {absent: true}, Access-Control-Allow-Credentials: {absent: true}}}}

  - name: proxy-rewrite-does-not-change-cors-origin
    source: {file: t/plugin/cors.t, tests: [34, 35]}
    config:
      routes:
        - id: cors-before-proxy-rewrite
          uri: /hello
          plugins:
            cors:
              allow_origins: http://sub.domain.com
              allow_methods: GET,POST
              allow_headers: headr1,headr2
              expose_headers: ex-headr1,ex-headr2
              max_age: 50
              allow_credential: true
            proxy-rewrite:
              headers: {Origin: http://example.com}
          upstream: {type: roundrobin, nodes: {"{{FIXTURE.primary.ADDR}}": 1}}
    fixtures:
      - name: primary
        kind: http
        expect: [{method: GET, path: {equals: /hello}, headers: {Origin: {equals: http://example.com}}}]
        respond: [{status: 200, headers: {Vary: Via}, body: hello world}]
    steps:
      - {name: cors-uses-original-origin, input: {method: GET, path: /hello, headers: {Origin: http://sub.domain.com}}, output: {status: 200, body: {equals: hello world}, headers: {Access-Control-Allow-Origin: {equals: http://sub.domain.com}, Vary: {equals: "Via, Origin"}, Access-Control-Allow-Methods: {equals: "GET,POST"}, Access-Control-Allow-Headers: {equals: "headr1,headr2"}, Access-Control-Expose-Headers: {equals: "ex-headr1,ex-headr2"}, Access-Control-Max-Age: {equals: '50'}, Access-Control-Allow-Credentials: {equals: 'true'}}}}

  - name: regex-no-origin
    source: {file: t/plugin/cors.t, tests: [36, 37]}
    config:
      routes:
        - id: cors-regex-no-origin
          uri: /hello
          plugins:
            cors:
              allow_origins: http://sub.domain.com
              allow_methods: GET,POST
              allow_headers: headr1,headr2
              expose_headers: ex-headr1,ex-headr2
              allow_credential: true
              allow_origins_by_regex: ['.*\.test.com$']
          upstream: {type: roundrobin, nodes: {"{{FIXTURE.primary.ADDR}}": 1}}
    fixtures:
      - name: primary
        kind: http
        respond: [{status: 200, body: hello world}]
    steps:
      - {name: no-origin-does-not-error, input: {method: GET, path: /hello}, output: {status: 200, body: {equals: hello world}, headers: {Access-Control-Allow-Origin: {absent: true}}}}

  - name: allow-origins-schema
    source: {file: t/plugin/cors2.t, tests: [1]}
    variants:
      - name: accept-wildcard
        config: {routes: [{id: origins-schema-wildcard, uri: /hello, plugins: {cors: {allow_origins: '*'}}, upstream: {type: roundrobin, nodes: {"{{UPSTREAM_ADDR}}": 1}}}]}
        upstream: {respond: {status: 200, body: hello world}}
        input: {method: GET, path: /hello}
        output: {status: 200, body: {equals: hello world}}
      - name: accept-force-wildcard
        config: {routes: [{id: origins-schema-force-wildcard, uri: /hello, plugins: {cors: {allow_origins: '**'}}, upstream: {type: roundrobin, nodes: {"{{UPSTREAM_ADDR}}": 1}}}]}
        upstream: {respond: {status: 200, body: hello world}}
        input: {method: GET, path: /hello}
        output: {status: 200, body: {equals: hello world}}
      - name: accept-null
        config: {routes: [{id: origins-schema-null, uri: /hello, plugins: {cors: {allow_origins: 'null'}}, upstream: {type: roundrobin, nodes: {"{{UPSTREAM_ADDR}}": 1}}}]}
        upstream: {respond: {status: 200, body: hello world}}
        input: {method: GET, path: /hello}
        output: {status: 200, body: {equals: hello world}}
      - name: accept-http-origin
        config: {routes: [{id: origins-schema-http, uri: /hello, plugins: {cors: {allow_origins: http://y.com.uk}}, upstream: {type: roundrobin, nodes: {"{{UPSTREAM_ADDR}}": 1}}}]}
        upstream: {respond: {status: 200, body: hello world}}
        input: {method: GET, path: /hello}
        output: {status: 200, body: {equals: hello world}}
      - name: accept-https-origin
        config: {routes: [{id: origins-schema-https, uri: /hello, plugins: {cors: {allow_origins: https://x.com}}, upstream: {type: roundrobin, nodes: {"{{UPSTREAM_ADDR}}": 1}}}]}
        upstream: {respond: {status: 200, body: hello world}}
        input: {method: GET, path: /hello}
        output: {status: 200, body: {equals: hello world}}
      - name: accept-two-origins
        config: {routes: [{id: origins-schema-two, uri: /hello, plugins: {cors: {allow_origins: 'https://x.com,http://y.com.uk'}}, upstream: {type: roundrobin, nodes: {"{{UPSTREAM_ADDR}}": 1}}}]}
        upstream: {respond: {status: 200, body: hello world}}
        input: {method: GET, path: /hello}
        output: {status: 200, body: {equals: hello world}}
      - name: accept-three-origins
        config: {routes: [{id: origins-schema-three, uri: /hello, plugins: {cors: {allow_origins: 'https://x.com,http://y.com.uk,http://c.tv'}}, upstream: {type: roundrobin, nodes: {"{{UPSTREAM_ADDR}}": 1}}}]}
        upstream: {respond: {status: 200, body: hello world}}
        input: {method: GET, path: /hello}
        output: {status: 200, body: {equals: hello world}}
      - name: accept-origin-with-port
        config: {routes: [{id: origins-schema-port, uri: /hello, plugins: {cors: {allow_origins: 'https://x.com,http://y.com.uk:12000,http://c.tv'}}, upstream: {type: roundrobin, nodes: {"{{UPSTREAM_ADDR}}": 1}}}]}
        upstream: {respond: {status: 200, body: hello world}}
        input: {method: GET, path: /hello}
        output: {status: 200, body: {equals: hello world}}
      - name: reject-empty
        config: {routes: [{id: origins-schema-empty, uri: /hello, plugins: {cors: {allow_origins: ''}}, upstream: {type: roundrobin, nodes: {127.0.0.1:1980: 1}}}]}
        input: {method: GET, path: /hello}
        output: {status: 404, logs: {matches: 'validate plugin cors config'}}
      - name: reject-star-suffix
        config: {routes: [{id: origins-schema-star-suffix, uri: /hello, plugins: {cors: {allow_origins: '*a'}}, upstream: {type: roundrobin, nodes: {127.0.0.1:1980: 1}}}]}
        input: {method: GET, path: /hello}
        output: {status: 404, logs: {matches: 'validate plugin cors config'}}
      - name: reject-wildcard-list
        config: {routes: [{id: origins-schema-wildcard-list, uri: /hello, plugins: {cors: {allow_origins: '*,http://y.com'}}, upstream: {type: roundrobin, nodes: {127.0.0.1:1980: 1}}}]}
        input: {method: GET, path: /hello}
        output: {status: 404, logs: {matches: 'validate plugin cors config'}}
      - name: reject-nulll
