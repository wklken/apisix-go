      routes:
        - id: datadog-corpus
          uri: "/*"
          upstream:
            type: roundrobin
            nodes:
              "{{FIXTURE.primary.ADDR}}": 1
    fixtures:
      - name: primary
        kind: http
        respond:
          - status: 200
            headers: {}
            body: "hello world"
          - status: 200
