        echo:
          body: hello upstream
      upstream:
        nodes:
          '{{UPSTREAM_ADDR}}': 1
        type: roundrobin
      uri: /hello_chunked
      id: echo-8
  input:
    method: GET
    path: /hello_chunked
  upstream:
    respond:
      status: 200
      body: hello world
  output:
    status: 200
    body:
