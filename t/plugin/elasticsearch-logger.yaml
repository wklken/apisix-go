cases:
    - config:
        routes:
            - id: elasticsearch-logger-source-1
              plugins:
                elasticsearch-logger:
                    batch_max_size: 1
                    endpoint_addr: '{{FIXTURE.sink.URL}}'
                    field:
                        index: integration
                    inactive_timeout: 1
              upstream:
                nodes:
                    '{{FIXTURE.primary.ADDR}}': 1
                type: roundrobin
              uri: /probe
      fixtures:
        - kind: http
          name: primary
          respond:
            - body: hello world
              headers: {}
              status: 200
        - kind: http
          name: sink
          expect:
            - method: GET
              path: {equals: /}
            - method: POST
              path: {matches: '^/_bulk\?timeout=10000ms$'}
          respond:
            - body: ok
              headers: {}
              status: 200
      name: elasticsearch-logger-source-1
      source:
        file: t/plugin/elasticsearch-logger.t
        tests:
            - 1
            - 2
