- name: test-032-hit-route-vars-do-not-match-age-is-missing
  source:
    file: t/plugin/fault-injection.t
    tests:
    - 32
  config:
    routes:
    - plugins:
        fault-injection:
          abort:
            http_status: 403
            body: 'Fault Injection!

              '
            vars:
            - - - arg_name
                - ==
                - jack
              - - arg_age
                - '!'
                - <
                - 18
            - - - http_apikey
                - ==
                - api-key
      upstream:
        nodes:
          '{{UPSTREAM_ADDR}}': 1
        type: roundrobin
      uri: /hello
      id: fault-injection-28
  input:
    method: GET
    path: /hello?name=allen
  upstream:
    respond:
      status: 200
      body: hello world
  output:
    status: 200
    body:
      equals: hello world
