sources:
  - repository: https://github.com/apache/apisix
    commit: c3d7d5ec69774121f53d2e20d29d09c816795dd7
    file: t/plugin/fault-injection.t
    tests: 39
  - repository: https://github.com/apache/apisix
    commit: c3d7d5ec69774121f53d2e20d29d09c816795dd7
    file: t/plugin/fault-injection2.t
    tests: 7

cases:
  - name: invalid-abort-status
    source: {file: t/plugin/fault-injection.t, tests: [1]}
    runtime: {plugins: [fault-injection]}
    config:
      routes:
        - id: fault-invalid-status
          uri: /hello
          plugins:
            fault-injection:
              abort: {http_status: invalid}
          upstream: {type: roundrobin, nodes: {127.0.0.1:1980: 1}}
    input: {method: GET, path: /hello}
    output: {status: 404, logs: {matches: fault-injection}}

  - name: invalid-abort-without-status
    source: {file: t/plugin/fault-injection.t, tests: [2]}
    runtime: {plugins: [fault-injection]}
    config:
      routes:
        - id: fault-invalid-abort
          uri: /hello
          plugins: {fault-injection: {abort: {}}}
          upstream: {type: roundrobin, nodes: {127.0.0.1:1980: 1}}
    input: {method: GET, path: /hello}
    output: {status: 404, logs: {matches: fault-injection}}

  - name: invalid-empty-config
    source: {file: t/plugin/fault-injection.t, tests: [3]}
    runtime: {plugins: [fault-injection]}
    config:
      routes:
        - id: fault-invalid-empty
          uri: /hello
          plugins: {fault-injection: {}}
          upstream: {type: roundrobin, nodes: {127.0.0.1:1980: 1}}
    input: {method: GET, path: /hello}
    output: {status: 404, logs: {matches: fault-injection}}

  - name: invalid-delay-without-duration
    source: {file: t/plugin/fault-injection.t, tests: [4]}
    runtime: {plugins: [fault-injection]}
    config:
      routes:
        - id: fault-invalid-delay
          uri: /hello
          plugins: {fault-injection: {delay: {}}}
          upstream: {type: roundrobin, nodes: {127.0.0.1:1980: 1}}
    input: {method: GET, path: /hello}
    output: {status: 404, logs: {matches: fault-injection}}

  - name: invalid-delay-string
    source: {file: t/plugin/fault-injection.t, tests: [5]}
    runtime: {plugins: [fault-injection]}
    config:
      routes:
        - id: fault-invalid-delay-string
          uri: /hello
          plugins: {fault-injection: {delay: {duration: invalid}}}
          upstream: {type: roundrobin, nodes: {127.0.0.1:1980: 1}}
    input: {method: GET, path: /hello}
    output: {status: 404, logs: {matches: fault-injection}}

  - name: invalid-delay-double-dot
    source: {file: t/plugin/fault-injection.t, tests: [6]}
    runtime: {plugins: [fault-injection]}
    config:
      routes:
        - id: fault-invalid-delay-double-dot
          uri: /hello
          plugins: {fault-injection: {delay: {duration: "1.2.3"}}}
          upstream: {type: roundrobin, nodes: {127.0.0.1:1980: 1}}
    input: {method: GET, path: /hello}
    output: {status: 404, logs: {matches: fault-injection}}

  - name: invalid-delay-whitespace
    source: {file: t/plugin/fault-injection.t, tests: [7]}
    runtime: {plugins: [fault-injection]}
    config:
      routes:
        - id: fault-invalid-delay-whitespace
          uri: /hello
          plugins: {fault-injection: {delay: {duration: " "}}}
          upstream: {type: roundrobin, nodes: {127.0.0.1:1980: 1}}
    input: {method: GET, path: /hello}
    output: {status: 404, logs: {matches: fault-injection}}

  - name: invalid-delay-vars
    source: {file: t/plugin/fault-injection.t, tests: [8]}
    runtime: {plugins: [fault-injection]}
    config:
      routes:
        - id: fault-invalid-delay-vars
          uri: /hello
          plugins:
            fault-injection:
              delay: {duration: 1, vars: [[arg_name, "=="]]}
          upstream: {type: roundrobin, nodes: {127.0.0.1:1980: 1}}
    input: {method: GET, path: /hello}
    output: {status: 404, logs: {matches: fault-injection}}

  - name: invalid-abort-vars
    source: {file: t/plugin/fault-injection.t, tests: [9]}
    runtime: {plugins: [fault-injection]}
    config:
      routes:
        - id: fault-invalid-abort-vars
          uri: /hello
          plugins:
            fault-injection:
              abort: {http_status: 403, vars: [[arg_name, "=="]]}
          upstream: {type: roundrobin, nodes: {127.0.0.1:1980: 1}}
    input: {method: GET, path: /hello}
    output: {status: 404, logs: {matches: fault-injection}}

  - name: delay
    source: {file: t/plugin/fault-injection.t, tests: [10, 11]}
    runtime: {plugins: [fault-injection]}
    config:
      routes:
        - id: fault-delay
          uri: /hello
          plugins: {fault-injection: {delay: {duration: 1}}}
          upstream:
            type: roundrobin
            nodes: {"{{FIXTURE.primary.ADDR}}": 1}
    fixtures:
      - name: primary
        kind: http
        respond: [{status: 200, body: "hello world"}]
    steps:
      - name: request
        input: {method: GET, path: /hello}
        output: {status: 200, body: {equals: "hello world"}}

  - name: abort-status-200
    source: {file: t/plugin/fault-injection.t, tests: [12, 13]}
    runtime: {plugins: [fault-injection]}
    config:
      routes:
        - id: fault-abort-200
          uri: /hello
          plugins:
            fault-injection:
              abort: {http_status: 200, body: "Fault Injection!\n"}
          upstream: {type: roundrobin, nodes: {127.0.0.1:1980: 1}}
    input: {method: GET, path: /hello}
    output: {status: 200, body: {equals: "Fault Injection!\n"}}

  - name: abort-status-405
    source: {file: t/plugin/fault-injection.t, tests: [14, 15]}
    runtime: {plugins: [fault-injection]}
    config:
      routes:
        - id: fault-abort-405
          uri: /hello
          plugins:
            fault-injection:
              abort: {http_status: 405, body: "Fault Injection!\n"}
          upstream: {type: roundrobin, nodes: {127.0.0.1:1980: 1}}
    input: {method: GET, path: /hello}
    output: {status: 405, body: {equals: "Fault Injection!\n"}}

  - name: abort-before-redirect
    source: {file: t/plugin/fault-injection.t, tests: [16, 17]}
    runtime: {plugins: [fault-injection, redirect]}
    config:
      routes:
        - id: fault-abort-redirect
          uri: /hello
          plugins:
            fault-injection:
              abort: {http_status: 200, body: "Fault Injection!\n"}
            redirect: {uri: /hello/world, ret_code: 302}
          upstream: {type: roundrobin, nodes: {127.0.0.1:1980: 1}}
    input: {method: GET, path: /hello}
    output: {status: 200, body: {equals: "Fault Injection!\n"}}

  - name: zero-abort-allows-redirect
    source: {file: t/plugin/fault-injection.t, tests: [18, 19]}
    runtime: {plugins: [fault-injection, redirect]}
    config:
      routes:
        - id: fault-zero-abort
          uri: /hello
          plugins:
            fault-injection:
              abort: {http_status: 200, body: "Fault Injection!\n", percentage: 0}
            redirect: {uri: /hello/world, ret_code: 302}
          upstream: {type: roundrobin, nodes: {127.0.0.1:1980: 1}}
    input: {method: GET, path: /hello}
    output:
      status: 302
      headers: {Location: {equals: /hello/world}}

  - name: zero-delay
    source: {file: t/plugin/fault-injection.t, tests: [20, 21]}
    runtime: {plugins: [fault-injection]}
    config:
      routes:
        - id: fault-zero-delay
          uri: /hello
          plugins: {fault-injection: {delay: {duration: 1, percentage: 0}}}
          upstream:
            type: roundrobin
            nodes: {"{{FIXTURE.primary.ADDR}}": 1}
    fixtures:
      - name: primary
        kind: http
        respond: [{status: 200, body: "hello1 world"}]
    steps:
      - name: request
        input: {method: GET, path: /hello}
        output: {status: 200, body: {equals: "hello1 world"}}

  - name: body-variable
    source: {file: t/plugin/fault-injection.t, tests: [22, 23]}
    runtime: {plugins: [fault-injection]}
    config:
      routes:
        - id: fault-body-variable
          uri: /hello
          plugins:
            fault-injection:
              abort: {http_status: 200, body: "client addr: $remote_addr\n"}
          upstream: {type: roundrobin, nodes: {127.0.0.1:1980: 1}}
    input: {method: GET, path: /hello}
    output: {status: 200, body: {equals: "client addr: 127.0.0.1\n"}}

  - name: abort-without-body
    source: {file: t/plugin/fault-injection.t, tests: [24, 25]}
    runtime: {plugins: [fault-injection]}
    config:
      routes:
        - id: fault-empty-abort
          uri: /hello
          plugins: {fault-injection: {abort: {http_status: 200}}}
          upstream: {type: roundrobin, nodes: {127.0.0.1:1980: 1}}
    input: {method: GET, path: /hello}
    output: {status: 200, body: {equals: ""}}

  - name: valid-vars-schema
    source: {file: t/plugin/fault-injection.t, tests: [26]}
    runtime: {plugins: [fault-injection]}
    config:
      routes:
        - id: fault-valid-vars
          uri: /hello
          plugins:
            fault-injection:
              abort:
                http_status: 403
                body: "Fault Injection!\n"
                vars:
                  - [[arg_name, "==", jack], [arg_age, "!", "<", 18]]
                  - [[http_apikey, "==", api-key]]
          upstream:
            type: roundrobin
            nodes: {"{{FIXTURE.primary.ADDR}}": 1}
    fixtures:
      - name: primary
        kind: http
        respond: [{status: 200, body: "hello world"}]
    steps:
      - name: request
        input: {method: GET, path: "/hello?name=allen"}
        output: {status: 200, body: {equals: "hello world"}}

  - name: invalid-vars-schema
    source: {file: t/plugin/fault-injection.t, tests: [27]}
    runtime: {plugins: [fault-injection]}
    config:
      routes:
        - id: fault-invalid-vars-schema
          uri: /hello
          plugins:
            fault-injection:
              abort:
                http_status: 403
                vars: [[arg_name, "!=", jack]]
          upstream: {type: roundrobin, nodes: {127.0.0.1:1980: 1}}
    input: {method: GET, path: /hello}
    output: {status: 404, logs: {matches: fault-injection}}

  - name: abort-vars
    source: {file: t/plugin/fault-injection.t, tests: [28, 29, 30, 31, 32, 33]}
    runtime: {plugins: [fault-injection]}
    config:
      routes:
        - id: fault-abort-vars
          uri: /hello
          plugins:
            fault-injection:
              abort:
                http_status: 403
                body: "Fault Injection!\n"
                vars:
                  - [[arg_name, "==", jack], [arg_age, "!", "<", 18]]
                  - [[http_apikey, "==", api-key]]
          upstream:
            type: roundrobin
            nodes: {"{{FIXTURE.primary.ADDR}}": 1}
    fixtures:
      - name: primary
        kind: http
        respond: [{status: 200, body: "hello world"}]
    steps:
      - name: all-vars
        input: {method: GET, path: "/hello?name=jack&age=18", headers: {apikey: api-key}}
        output: {status: 403, body: {equals: "Fault Injection!\n"}}
      - name: missing-apikey
        input: {method: GET, path: "/hello?name=jack&age=20"}
        output: {status: 403, body: {equals: "Fault Injection!\n"}}
      - name: missing-parameters
        input: {method: GET, path: /hello, headers: {apikey: api-key}}
        output: {status: 403, body: {equals: "Fault Injection!\n"}}
      - name: missing-age
        input: {method: GET, path: "/hello?name=allen"}
        output: {status: 200, body: {equals: "hello world"}}
      - name: no-vars
        input: {method: GET, path: /hello}
        output: {status: 200, body: {equals: "hello world"}}

  - name: delay-vars
    source: {file: t/plugin/fault-injection.t, tests: [34, 35, 36]}
    runtime: {plugins: [fault-injection]}
    config:
      routes:
        - id: fault-delay-vars
          uri: /hello
          plugins:
            fault-injection:
              delay:
                duration: 0.05
                vars: [[[arg_name, "==", jack], [arg_age, "!", "<", 18]]]
          upstream:
            type: roundrobin
            nodes: {"{{FIXTURE.primary.ADDR}}": 1}
    fixtures:
      - name: primary
        kind: http
        respond:
          - {status: 200, body: "hello world"}
          - {status: 200, body: "hello world"}
    steps:
      - name: delayed
        input: {method: GET, path: "/hello?name=jack&age=22"}
        output: {status: 200, body: {equals: "hello world"}}
      - name: no-delay
        input: {method: GET, path: /hello}
        output: {status: 200, body: {equals: "hello world"}}

  - name: abort-and-delay-vars
    source: {file: t/plugin/fault-injection.t, tests: [37, 38, 39]}
    runtime: {plugins: [fault-injection]}
    config:
      routes:
        - id: fault-abort-delay-vars
          uri: /hello
          plugins:
            fault-injection:
              abort:
                http_status: 403
                body: "Fault Injection!\n"
                vars: [[[arg_name, "==", jack], [arg_age, "!", "<", 18]]]
              delay:
                duration: 0.05
                vars: [[[http_apikey, "==", api-key]]]
          upstream:
            type: roundrobin
            nodes: {"{{FIXTURE.primary.ADDR}}": 1}
    fixtures:
      - name: primary
        kind: http
        respond: [{status: 200, body: "hello world"}]
    steps:
      - name: abort-and-delay
        input: {method: GET, path: "/hello?name=jack&age=18", headers: {apikey: api-key}}
        output: {status: 403, body: {equals: "Fault Injection!\n"}}
      - name: delay-only
        input: {method: GET, path: "/hello?name=jack&age=16", headers: {apikey: api-key}}
        output: {status: 200, body: {equals: "hello world"}}

  - name: negated-vars
    source: {file: t/plugin/fault-injection2.t, tests: [1, 2, 3]}
    runtime: {plugins: [fault-injection]}
    config:
      routes:
        - id: fault-negated-vars
          uri: /hello
          plugins:
            fault-injection:
              abort:
                http_status: 403
                body: "Fault Injection!\n"
                vars: [["!AND", [arg_name, "==", jack], [arg_age, "!", "<", 18]]]
          upstream:
            type: roundrobin
            nodes: {"{{FIXTURE.primary.ADDR}}": 1}
    fixtures:
      - name: primary
        kind: http
        respond: [{status: 200, body: "hello world"}]
    steps:
      - name: negated-hit
        input: {method: GET, path: "/hello?name=jack&age=17"}
        output: {status: 403, body: {equals: "Fault Injection!\n"}}
      - name: negated-miss
        input: {method: GET, path: "/hello?name=jack&age=18"}
        output: {status: 200, body: {equals: "hello world"}}

  - name: injected-headers
    source: {file: t/plugin/fault-injection2.t, tests: [4, 5]}
    runtime: {plugins: [fault-injection]}
    config:
      routes:
        - id: fault-injected-headers
          uri: /hello
          plugins:
            fault-injection:
              abort:
                http_status: 200
                headers: {h1: v1, h2: 2, h3: "$uri"}
          upstream: {type: roundrobin, nodes: {127.0.0.1:1980: 1}}
    input: {method: GET, path: /hello}
    output:
      status: 200
      headers: {h1: {equals: v1}, h2: {equals: "2"}, h3: {equals: /hello}}

  - name: body-variable-json
    source: {file: t/plugin/fault-injection2.t, tests: [6, 7]}
    runtime: {plugins: [fault-injection]}
    config:
      routes:
        - id: fault-body-json
          uri: /hello
          plugins:
            fault-injection:
              abort: {http_status: 200, body: '{"count": $arg_count}'}
          upstream: {type: roundrobin, nodes: {127.0.0.1:1980: 1}}
    input: {method: GET, path: "/hello?count=2"}
    output: {status: 200, body: {equals: '{"count": 2}'}}
