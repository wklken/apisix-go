  - name: fault-injection2-corpus
    source:
      file: t/plugin/fault-injection2.t
      tests:
        - 1
        - 2
        - 3
        - 4
        - 5
        - 6
        - 7
    config:
      routes:
        - id: fault-injection2-corpus
          uri: "/*"
          upstream:
            type: roundrobin
            nodes:
              "{{FIXTURE.primary.ADDR}}": 1
    fixtures:
      - name: primary
        kind: http
        respond:
          - status: 200
            headers: {}
            body: "hello world"
          - status: 403
            headers: {}
            body: "validation failed"
          - status: 200
            headers: {}
            body: "hello world"
          - status: 200
            headers: {}
            body: "hello world"
          - status: 200
            headers:
              h1: v1
              h2: "2"
              h3: "/hello"
            body: "hello world"
          - status: 200
            headers: {}
            body: "hello world"
          - status: 200
            headers: {}
            body: "hello world"
    steps:
      - name: fault-injection2-001-vars-rule-with-set
        input:
          method: GET
          path: "/hello"
        output:
          status: 200
          body:
            equals: "hello world"
      - name: fault-injection2-002-vars-rule-with-hit
        input:
          method: GET
          path: "/hello?name=jack&age=17"
        output:
          status: 403
          body:
            equals: "validation failed"
      - name: fault-injection2-003-vars-rule-with-miss
        input:
          method: GET
          path: "/hello?name=jack&age=18"
        output:
          status: 200
          body:
            equals: "hello world"
      - name: fault-injection2-004-inject-header-config
        input:
          method: GET
          path: "/hello"
        output:
          status: 200
          body:
            equals: "hello world"
      - name: fault-injection2-005-inject-header
        input:
          method: GET
          path: "/hello"
        output:
          status: 200
          body:
            equals: "hello world"
          headers:
            h1:
              equals: v1
            h2:
              equals: "2"
            h3:
              equals: "/hello"
      - name: fault-injection2-006-closing-curly-brace-not-should-not-be-a-part-of-variable
        input:
          method: GET
          path: "/hello"
        output:
          status: 200
          body:
            equals: "hello world"
      - name: fault-injection2-007-test-route
        input:
          method: GET
          path: "/hello?count=2"
        output:
          status: 200
          body:
            equals: "hello world"
