cases:
    - config:
        routes:
            - id: forward-auth-source-1
              plugins:
                forward-auth:
                    request_headers:
                        - Authorization
                    upstream_headers:
                        - X-User
                    uri: '{{FIXTURE.auth.URL}}/check'
              upstream:
                nodes:
                    '{{FIXTURE.primary.ADDR}}': 1
                type: roundrobin
              uri: /probe
      fixtures:
        - kind: http
          name: primary
          respond:
            - body: hello world
              headers: {}
              status: 200
        - kind: http
          name: auth
          respond:
            - body: ok
              headers:
                X-User: integration
              status: 200
