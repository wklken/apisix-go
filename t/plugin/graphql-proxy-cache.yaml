    fixtures:
      - name: primary
        kind: http
        respond: [{status: 200, body: '{"data":{"hello":"variant-a"}}'}, {status: 200, body: '{"data":{"hello":"variant-b"}}'}]
    steps:
      - name: variant-a-miss
        input: {method: POST, path: /graphql, headers: {Content-Type: application/json}, body: '{"query":"{ hello }"}'}
        output:
          status: 200
