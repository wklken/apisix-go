  - name: request-body-digest
    source: {file: t/plugin/hmac-auth3.t, tests: [1, 2, 3, 4, 5]}
    config:
      consumers:
        - username: robin
          plugins: {hmac-auth: {key_id: my-access-key, secret_key: my-secret-key}}
      routes:
        - id: hmac-body-digest
