sources:
  - repository: https://github.com/apache/apisix
    commit: c3d7d5ec69774121f53d2e20d29d09c816795dd7
    file: t/plugin/hmac-auth.t
    tests: 40
  - repository: https://github.com/apache/apisix
    commit: c3d7d5ec69774121f53d2e20d29d09c816795dd7
    file: t/plugin/hmac-auth2.t
    tests: 5
  - repository: https://github.com/apache/apisix
    commit: c3d7d5ec69774121f53d2e20d29d09c816795dd7
    file: t/plugin/hmac-auth3.t
    tests: 8
  - repository: https://github.com/apache/apisix
    commit: c3d7d5ec69774121f53d2e20d29d09c816795dd7
    file: t/plugin/hmac-auth4.t
    tests: 5
  - repository: https://github.com/apache/apisix
    commit: c3d7d5ec69774121f53d2e20d29d09c816795dd7
    file: t/plugin/hmac-auth-anonymous-consumer.t
    tests: 6
  - repository: https://github.com/apache/apisix
    commit: c3d7d5ec69774121f53d2e20d29d09c816795dd7
    file: t/plugin/hmac-auth-realm.t
    tests: 6

cases:
  - name: valid-consumer-schema
    source: {file: t/plugin/hmac-auth.t, tests: [1]}
    config:
      consumers:
        - username: jack
          plugins: {hmac-auth: {key_id: my-access-key, secret_key: my-secret-key}}
      routes:
        - id: hmac-valid-consumer
          uri: /hello
          plugins: {hmac-auth: {}}
          upstream: {type: roundrobin, nodes: {"{{FIXTURE.primary.ADDR}}": 1}}
    fixtures:
      - name: primary
        kind: http
        expect: [{method: GET, path: {equals: /hello}}]
        respond: [{status: 200, body: hello world}]
    steps:
      - name: valid-consumer-authenticates
        input:
          path: /hello
          hmac: &valid_hmac
            key_id: my-access-key
            secret: my-secret-key
            algorithm: hmac-sha256
            headers: ['@request-target', date]
        output: {status: 200, body: {equals: hello world}, logs: {not_matches: '\bmy-secret-key\b'}}

  - name: invalid-consumer-snapshots-retain-last-good
    source: {file: t/plugin/hmac-auth.t, tests: [2, 3, 4, 5, 26]}
    config: &hmac_last_good
      consumers:
        - username: jack
          plugins: {hmac-auth: {key_id: my-access-key, secret_key: my-secret-key}}
      routes:
        - id: hmac-last-good
          uri: /ready
          plugins:
            hmac-auth: {}
            mocking: {_meta: {priority: -1000}, response_status: 204, response_example: ready}
    steps:
      - name: last-good-consumer-is-active
        input: {path: /ready, hmac: *valid_hmac}
        output: {status: 204}
      - name: reject-missing-secret-key
        wait: 100ms
        config:
          consumers:
            - username: jack
              plugins: {hmac-auth: {key_id: my-access-key}}
          routes:
            - id: hmac-last-good
              uri: /ready
              plugins:
                hmac-auth: {}
                mocking: {_meta: {priority: -1000}, response_status: 204, response_example: ready}
        config_probe:
          input: {path: /ready, hmac: *valid_hmac}
          output: {status: 204}
        input: {path: /ready, hmac: *valid_hmac}
        output: {status: 204, logs: {matches: "hmac-auth consumer configuration:.*missing properties: 'secret_key'"}}
      - name: reject-missing-key-id
        wait: 100ms
        config:
          consumers:
            - username: jack
              plugins: {hmac-auth: {secret_key: my-secret-key}}
          routes:
            - id: hmac-last-good
              uri: /ready
              plugins:
                hmac-auth: {}
                mocking: {_meta: {priority: -1000}, response_status: 204, response_example: ready}
        config_probe:
          input: {path: /ready, hmac: *valid_hmac}
          output: {status: 204}
        input: {path: /ready, hmac: *valid_hmac}
        output: {status: 204, logs: {matches: "hmac-auth consumer configuration:.*missing properties: 'key_id'"}}
      - name: reject-key-id-over-256-bytes
        wait: 100ms
        config:
          consumers:
            - username: jack
              plugins:
                hmac-auth:
                  key_id: 
                  secret_key: skey
          routes:
            - id: hmac-last-good
              uri: /ready
              plugins:
                hmac-auth: {}
                mocking: {_meta: {priority: -1000}, response_status: 204, response_example: ready}
        config_probe:
          input: {path: /ready, hmac: *valid_hmac}
          output: {status: 204}
        input: {path: /ready, hmac: *valid_hmac}
        output: {status: 204, logs: {matches: 'hmac-auth consumer configuration:.*key_id.*length must be <= 256'}}
      - name: reject-secret-key-over-256-bytes
        wait: 100ms
        config:
          consumers:
            - username: jack
              plugins:
                hmac-auth:
                  key_id: akey
                  secret_key: 
          routes:
            - id: hmac-last-good
              uri: /ready
              plugins:
                hmac-auth: {}
                mocking: {_meta: {priority: -1000}, response_status: 204, response_example: ready}
        config_probe:
          input: {path: /ready, hmac: *valid_hmac}
          output: {status: 204}
        input: {path: /ready, hmac: *valid_hmac}
        output: {status: 204, logs: {matches: 'hmac-auth consumer configuration:.*secret_key.*length must be <= 256'}}
      - name: reject-empty-consumer-plugin
        wait: 100ms
        config:
          consumers:
            - username: jack
              plugins: {hmac-auth: {}}
          routes:
            - id: hmac-last-good
              uri: /ready
              plugins:
                hmac-auth: {}
                mocking: {_meta: {priority: -1000}, response_status: 204, response_example: ready}
        config_probe:
          input: {path: /ready, hmac: *valid_hmac}
          output: {status: 204}
        input: {path: /ready, hmac: *valid_hmac}
        output: {status: 204, logs: {matches: "hmac-auth consumer configuration:.*missing properties: '(key_id|secret_key)'"}}

  - name: authorization-parsing-and-lookup
    source: {file: t/plugin/hmac-auth.t, tests: [6, 7, 8, 9, 10]}
    config:
      consumers:
        - username: jack
          plugins: {hmac-auth: {key_id: my-access-key, secret_key: my-secret-key}}
      routes:
        - id: hmac-authorization-validation
          uri: /hello
          plugins: {hmac-auth: {clock_skew: 1000000000}}
          upstream: {type: roundrobin, nodes: {"{{FIXTURE.primary.ADDR}}": 1}}
    fixtures:
      - name: primary
        kind: http
        expect_requests: 0
        respond: [{status: 200, body: should-not-run}]
    steps:
      - name: missing-authorization
        input: {path: /hello}
        output:
          status: 401
          body: {equals: '{"message":"client request can''t be validated: missing Authorization header"}'}
          logs: {matches: "client request can't be validated: missing Authorization header"}
      - name: missing-algorithm
        input:
          path: /hello
          headers:
            Date: 'Thu, 24 Sep 2020 06:39:52 GMT'
            Authorization: 'Signature keyId="my-access-key",headers="@request-target date",signature="asdf"'
        output: {status: 401, body: {equals: '{"message":"client request can''t be validated"}'}, logs: {matches: 'algorithm missing'}}
      - name: invalid-key-id
        input:
          path: /hello
          hmac: {key_id: unknown, secret: irrelevant, algorithm: hmac-sha256, headers: ['@request-target', date]}
        output: {status: 401, body: {equals: '{"message":"client request can''t be validated"}'}, logs: {matches: 'Invalid key_id'}}
      - name: invalid-algorithm
        input:
          path: /hello
          headers:
            Date: 'Thu, 24 Sep 2020 06:39:52 GMT'
            Authorization: 'Signature keyId="my-access-key",algorithm="invalid",headers="@request-target date",signature="asdf"'
        output: {status: 401, body: {equals: '{"message":"client request can''t be validated"}'}, logs: {matches: 'Invalid algorithm'}}

  - name: clock-and-date-validation
    source: {file: t/plugin/hmac-auth.t, tests: [11, 12, 13]}
    config:
      consumers:
        - username: jack
          plugins: {hmac-auth: {key_id: my-access-key, secret_key: my-secret-key}}
      routes:
        - id: hmac-clock-validation
          uri: /hello
          plugins: {hmac-auth: {}}
          upstream: {type: roundrobin, nodes: {"{{FIXTURE.primary.ADDR}}": 1}}
    fixtures:
      - name: primary
        kind: http
        expect_requests: 0
        respond: [{status: 200, body: should-not-run}]
    steps:
      - name: clock-skew-exceeded
        input:
          path: /hello
          headers:
            Date: 'Thu, 24 Sep 2020 06:39:52 GMT'
            Authorization: 'Signature keyId="my-access-key",algorithm="hmac-sha256",headers="@request-target date",signature="asdf"'
        output: {status: 401, body: {equals: '{"message":"client request can''t be validated"}'}, logs: {matches: 'Clock skew exceeded'}}
      - name: missing-date
        input:
          path: /hello
          headers: {Authorization: 'Signature keyId="my-access-key",algorithm="hmac-sha256",headers="@request-target date",signature="asdf"'}
        output: {status: 401, body: {equals: '{"message":"client request can''t be validated"}'}, logs: {matches: 'Date header missing'}}
      - name: invalid-gmt-date
        input:
          path: /hello
          headers: {Date: adfsdf, Authorization: 'Signature keyId="my-access-key",algorithm="hmac-sha256",headers="@request-target date",signature="asdf"'}
        output: {status: 401, body: {equals: '{"message":"client request can''t be validated"}'}, logs: {matches: 'Invalid GMT format time'}}

  - name: valid-signature-with-custom-headers
    source: {file: t/plugin/hmac-auth.t, tests: [14]}
    config:
      consumers:
        - username: jack
          plugins: {hmac-auth: {key_id: my-access-key, secret_key: my-secret-key}}
      routes:
        - id: hmac-valid-custom-headers
          uri: /hello
          plugins: {hmac-auth: {}}
          upstream: {type: roundrobin, nodes: {"{{FIXTURE.primary.ADDR}}": 1}}
    fixtures:
      - name: primary
        kind: http
        expect:
          - method: GET
            path: {equals: /hello}
            headers:
              X-Custom-Header-A: {equals: 'asld$%dfasf'}
              X-Custom-Header-B: {equals: 23879fmsldfk}
        respond: [{status: 200, body: hello world}]
        count: {at_least: 3, at_most: 3}
    steps:
      - name: sha1-custom-headers-authenticate
        input:
          path: /hello
          headers: {X-Custom-Header-A: 'asld$%dfasf', X-Custom-Header-B: 23879fmsldfk}
          hmac: {key_id: my-access-key, secret: my-secret-key, algorithm: hmac-sha1, headers: ['@request-target', date, x-custom-header-a, x-custom-header-b]}
        output: {status: 200, body: {equals: hello world}}
      - name: sha256-custom-headers-authenticate
        input:
          path: /hello
          headers: {X-Custom-Header-A: 'asld$%dfasf', X-Custom-Header-B: 23879fmsldfk}
          hmac: {key_id: my-access-key, secret: my-secret-key, algorithm: hmac-sha256, headers: ['@request-target', date, x-custom-header-a, x-custom-header-b]}
        output: {status: 200, body: {equals: hello world}, logs: {not_matches: '\bmy-secret-key\b'}}
      - name: sha512-custom-headers-authenticate
        input:
          path: /hello
          headers: {X-Custom-Header-A: 'asld$%dfasf', X-Custom-Header-B: 23879fmsldfk}
          hmac: {key_id: my-access-key, secret: my-secret-key, algorithm: hmac-sha512, headers: ['@request-target', date, x-custom-header-a, x-custom-header-b]}
        output: {status: 200, body: {equals: hello world}}

  - name: clock-skew-schema-rejection
    source: {file: t/plugin/hmac-auth.t, tests: [15]}
    config:
      consumers:
        - username: jack
          plugins: {hmac-auth: {key_id: my-access-key, secret_key: my-secret-key}}
      routes:
        - id: hmac-clock-skew-zero
          uri: /ready
          plugins:
            hmac-auth: {}
            mocking: {_meta: {priority: -1000}, response_status: 204, response_example: ready}
    steps:
      - name: valid-route-is-active
        input: {path: /ready, hmac: *valid_hmac}
        output: {status: 204}
      - name: zero-clock-skew-update-is-rejected
        wait: 100ms
        config:
          consumers:
            - username: jack
              plugins: {hmac-auth: {key_id: my-access-key, secret_key: my-secret-key}}
          routes:
            - id: hmac-clock-skew-zero
              uri: /ready
              plugins:
                hmac-auth: {clock_skew: 0}
                mocking: {_meta: {priority: -1000}, response_status: 204, response_example: ready}
        config_probe:
          input: {path: /ready, hmac: *valid_hmac}
          output: {status: 204}
        input: {path: /ready, hmac: *valid_hmac}
        output: {status: 204, logs: {matches: 'build route hmac-clock-skew-zero fail:.*hmac-auth.*clock_skew.*1'}}

  - name: invalid-signature-with-large-clock-window
    source: {file: t/plugin/hmac-auth.t, tests: [16, 17, 18]}
    config:
      consumers:
        - username: jack
          plugins: {hmac-auth: {key_id: my-access-key, secret_key: my-secret-key}}
      routes:
        - id: hmac-invalid-signature
          uri: /hello
          plugins: {hmac-auth: {clock_skew: 1000000000000}}
          upstream: {type: roundrobin, nodes: {"{{FIXTURE.primary.ADDR}}": 1}}
    fixtures:
      - name: primary
        kind: http
        expect_requests: 0
        respond: [{status: 200, body: should-not-run}]
    steps:
      - name: invalid-signature-repeated
        repeat: 2
        input:
          path: /hello
          headers:
            Date: 'Thu, 24 Sep 2020 06:39:52 GMT'
            Authorization: 'Signature keyId="my-access-key",algorithm="hmac-sha256",headers="@request-target date",signature="asdf"'
        output: {status: 401, body: {equals: '{"message":"client request can''t be validated"}'}, logs: {matches: 'Invalid signature'}}

  - name: one-second-clock-skew
    source: {file: t/plugin/hmac-auth.t, tests: [19, 20]}
    config:
      consumers:
        - username: jack
          plugins: {hmac-auth: {key_id: my-access-key, secret_key: my-secret-key}}
      routes:
        - id: hmac-one-second-clock
          uri: /hello
          plugins: {hmac-auth: {clock_skew: 1}}
          upstream: {type: roundrobin, nodes: {"{{FIXTURE.primary.ADDR}}": 1}}
    fixtures:
      - name: primary
        kind: http
        expect_requests: 0
        respond: [{status: 200, body: should-not-run}]
    steps:
      - name: stale-relative-date-is-rejected
        input:
          path: /hello
          hmac: {key_id: my-access-key, secret: my-secret-key, algorithm: hmac-sha256, headers: ['@request-target', date], date_offset: -2s}
        output: {status: 401, body: {equals: '{"message":"client request can''t be validated"}'}, logs: {matches: 'Clock skew exceeded'}}

  - name: default-clock-skew-put
    source: {file: t/plugin/hmac-auth.t, tests: [21, 22]}
    config:
      consumers:
        - username: jack
          plugins: {hmac-auth: {key_id: my-access-key, secret_key: my-secret-key}}
      routes:
        - id: hmac-put
          uri: /hello
          methods: [PUT]
          plugins: {hmac-auth: {}}
          upstream: {type: roundrobin, nodes: {"{{FIXTURE.primary.ADDR}}": 1}}
    fixtures:
      - name: primary
        kind: http
        expect:
          - method: PUT
            path: {equals: /hello}
            body: {equals: '{"cert":"ssl_cert","key":"ssl_key","sni":"test.com"}'}
        respond: [{status: 200, body: passed}]
    steps:
      - name: signed-put-reaches-upstream
        input:
          method: PUT
          path: /hello
          body: '{"cert":"ssl_cert","key":"ssl_key","sni":"test.com"}'
          headers: {X-Custom-Header-A: 'asld$%dfasf', X-Custom-Header-B: 23879fmsldfk}
          hmac: {key_id: my-access-key, secret: my-secret-key, algorithm: hmac-sha256, headers: ['@request-target', date, x-custom-header-a, x-custom-header-b]}
        output: {status: 200, body: {equals: passed}, logs: {not_matches: '\bmy-secret-key\b'}}

  - name: required-signed-headers
    source: {file: t/plugin/hmac-auth.t, tests: [23, 24, 25]}
    config:
      consumers:
        - username: jack
          plugins: {hmac-auth: {key_id: my-access-key, secret_key: my-secret-key}}
      routes:
        - id: hmac-required-headers
          uri: /hello
          plugins: {hmac-auth: {signed_headers: [date, x-custom-header-a, x-custom-header-b]}}
          upstream: {type: roundrobin, nodes: {"{{FIXTURE.primary.ADDR}}": 1}}
    fixtures:
      - name: primary
        kind: http
        expect:
          - method: GET
            path: {equals: /hello}
            headers:
              X-Custom-Header-A: {equals: 'asld$%dfasf'}
              X-Custom-Header-B: {equals: 'asld$%dfasf'}
        respond: [{status: 200, body: hello world}]
    steps:
      - name: configured-header-missing-from-signing-list
        input:
          path: /hello
          headers: {X-Custom-Header-A: 'asld$%dfasf', X-Custom-Header-C: 23879fmsldfk}
          hmac: {key_id: my-access-key, secret: my-secret-key, algorithm: hmac-sha256, headers: ['@request-target', date, x-custom-header-a, x-custom-header-c]}
        output: {status: 401, body: {equals: '{"message":"client request can''t be validated"}'}, logs: {matches: 'x-custom-header-b.*missing in signing'}}
      - name: all-configured-headers-are-signed
        input:
          path: /hello
          headers: {X-Custom-Header-A: 'asld$%dfasf', X-Custom-Header-B: 'asld$%dfasf'}
          hmac: {key_id: my-access-key, secret: my-secret-key, algorithm: hmac-sha256, headers: ['@request-target', date, x-custom-header-a, x-custom-header-b]}
        output: {status: 200, body: {equals: hello world}}

  - name: empty-allowed-algorithms-rejected
    source: {file: t/plugin/hmac-auth.t, tests: [27]}
    config:
      consumers:
        - username: jack
          plugins: {hmac-auth: {key_id: my-access-key, secret_key: my-secret-key}}
      routes:
        - id: hmac-empty-algorithms
          uri: /ready
          plugins:
            hmac-auth: {}
            mocking: {_meta: {priority: -1000}, response_status: 204, response_example: ready}
    steps:
      - name: valid-route-is-active
        input: {path: /ready, hmac: *valid_hmac}
        output: {status: 204}
      - name: empty-algorithm-update-is-rejected
        wait: 100ms
        config:
          consumers:
            - username: jack
              plugins: {hmac-auth: {key_id: my-access-key, secret_key: my-secret-key}}
          routes:
            - id: hmac-empty-algorithms
              uri: /ready
              plugins:
                hmac-auth: {allowed_algorithms: []}
                mocking: {_meta: {priority: -1000}, response_status: 204, response_example: ready}
        config_probe:
          input: {path: /ready, hmac: *valid_hmac}
          output: {status: 204}
        input: {path: /ready, hmac: *valid_hmac}
        output: {status: 204, logs: {matches: 'build route hmac-empty-algorithms fail:.*hmac-auth.*allowed_algorithms.*minimum 1 items required'}}

  - name: hide-credentials
    source: {file: t/plugin/hmac-auth.t, tests: [28, 29]}
    config:
      consumers:
        - username: jack
          plugins: {hmac-auth: {key_id: my-access-key, secret_key: my-secret-key}}
      routes:
        - id: hmac-hide-credentials
          uri: /headers
          plugins: {hmac-auth: {hide_credentials: true}}
          upstream: {type: roundrobin, nodes: {"{{FIXTURE.primary.ADDR}}": 1}}
    fixtures:
      - name: primary
        kind: http
        expect:
          - method: GET
            path: {equals: /headers}
            headers: {Authorization: {absent: true}}
        respond: [{status: 200, body: passed}]
    steps:
      - name: authorization-is-removed-before-upstream
        input:
          path: /headers
          hmac: *valid_hmac
        output: {status: 200, body: {equals: passed}, logs: {not_matches: '\bmy-secret-key\b'}}

  - name: signed-header-cardinality
    source: {file: t/plugin/hmac-auth.t, tests: [30, 31, 32]}
    config:
      consumers:
        - username: jack
          plugins: {hmac-auth: {key_id: my-access-key, secret_key: my-secret-key}}
      routes:
        - id: hmac-header-cardinality
          uri: /hello
          plugins:
            hmac-auth:
              clock_skew: 1000000000
              signed_headers: [date, x-custom-header-a, x-custom-header-b]
          upstream: {type: roundrobin, nodes: {"{{FIXTURE.primary.ADDR}}": 1}}
    fixtures:
      - name: primary
        kind: http
        expect_requests: 0
        respond: [{status: 200, body: should-not-run}]
    steps:
      - name: signature-binds-a-header-not-sent-by-client
        input:
          path: /hello
          headers:
            Date: 'Thu, 24 Sep 2020 06:39:52 GMT'
            X-Custom-Header-A: 'asld$%dfasf'
            Authorization: 'Signature keyId="my-access-key",algorithm="hmac-sha256",headers="@request-target date x-custom-header-a x-custom-header-b",signature="pz9FBA5rcAQuXQMsTH1hmWF840BAIe79gHOTwL0yUkI="'
        output: {status: 401, body: {equals: '{"message":"client request can''t be validated"}'}, logs: {matches: 'Invalid signature'}}
      - name: client-sends-a-header-not-bound-by-signature
        input:
          path: /hello
          headers:
            Date: 'Thu, 24 Sep 2020 06:39:52 GMT'
            X-Custom-Header-A: 'asld$%dfasf'
            X-Custom-Header-B: 'asld$%dfasf'
            Authorization: 'Signature keyId="my-access-key",algorithm="hmac-sha256",headers="@request-target date x-custom-header-a x-custom-header-b",signature="Vfu/wid0QUmobexr/8xMJr6FjEnAWeE1lakghCi88c0="'
        output: {status: 401, body: {equals: '{"message":"client request can''t be validated"}'}, logs: {matches: 'Invalid signature'}}

  - name: restricted-algorithm
    source: {file: t/plugin/hmac-auth.t, tests: [33, 34]}
    config:
      consumers:
        - username: jack
          plugins: {hmac-auth: {key_id: my-access-key, secret_key: my-secret-key}}
      routes:
        - id: hmac-restricted-algorithm
          uri: /hello
          plugins: {hmac-auth: {allowed_algorithms: [hmac-sha256]}}
          upstream: {type: roundrobin, nodes: {"{{FIXTURE.primary.ADDR}}": 1}}
    fixtures:
      - name: primary
        kind: http
        expect_requests: 0
        respond: [{status: 200, body: should-not-run}]
    steps:
      - name: sha1-is-rejected-when-only-sha256-is-allowed
        input:
          path: /hello
          hmac: {key_id: my-access-key, secret: my-secret-key, algorithm: hmac-sha1, headers: ['@request-target', date]}
        output: {status: 401, body: {equals: '{"message":"client request can''t be validated"}'}, logs: {matches: 'Invalid algorithm'}}

  - name: default-date-signed-header
    source: {file: t/plugin/hmac-auth.t, tests: [35, 36, 37]}
    config:
      consumers:
        - username: jack
          plugins: {hmac-auth: {key_id: my-access-key, secret_key: my-secret-key}}
      routes:
        - id: hmac-default-date
          uri: /hello
          plugins: {hmac-auth: {}}
          upstream: {type: roundrobin, nodes: {"{{FIXTURE.primary.ADDR}}": 1}}
    fixtures:
      - name: primary
        kind: http
        expect: [{method: GET, path: {equals: /hello}}]
        respond: [{status: 200, body: hello world}]
    steps:
      - name: omitted-headers-clause-does-not-bind-date
        input:
          path: /hello
          hmac: {key_id: my-access-key, secret: my-secret-key, algorithm: hmac-sha256, headers: [], date: now}
        output: {status: 401, body: {equals: '{"message":"client request can''t be validated"}'}, logs: {matches: 'date.*missing in signing'}}
      - name: date-bound-into-default-signing-string
        input:
          path: /hello
          hmac: {key_id: my-access-key, secret: my-secret-key, algorithm: hmac-sha256, headers: [date]}
