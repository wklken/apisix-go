        expect:
          - method: POST
            path: {equals: /hello}
            body: {equals: '{"name": "world"}'}
        respond: [{status: 200, body: passed}]
    steps:
      - name: missing-digest
        input:
          method: POST
          path: /hello
          body: '{"name": "world"}'
          headers: {X-Custom-Header-A: 'asld$%dfasf', X-Custom-Header-B: 23879fmsldfk}
          hmac: {key_id: my-access-key, secret: my-secret-key, algorithm: hmac-sha256, headers: ['@request-target', date, x-custom-header-a, x-custom-header-b]}
        output: {status: 401, body: {equals: '{"message":"client request can''t be validated"}'}, logs: {matches: 'Invalid digest'}}
      - name: invalid-digest
        input:
          method: POST
          path: /hello
          body: '{"name": "world"}'
          headers: {Digest: hello, X-Custom-Header-A: 'asld$%dfasf', X-Custom-Header-B: 23879fmsldfk}
          hmac: {key_id: my-access-key, secret: my-secret-key, algorithm: hmac-sha256, headers: ['@request-target', date, x-custom-header-a, x-custom-header-b]}
        output: {status: 401, body: {equals: '{"message":"client request can''t be validated"}'}, logs: {matches: 'Invalid digest'}}
      - name: valid-digest
        input:
          method: POST
          path: /hello
          body: '{"name": "world"}'
          headers: {Digest: 'SHA-256=78qzJuLwSpZ8HacsTdFCQJWxzPMOf8bYctRk2ySLpS8=', X-Custom-Header-A: 'asld$%dfasf', X-Custom-Header-B: 23879fmsldfk}
          hmac: {key_id: my-access-key, secret: my-secret-key, algorithm: hmac-sha256, headers: ['@request-target', date, x-custom-header-a, x-custom-header-b]}
        output: {status: 200, body: {equals: passed}}

