      routes:
        - id: hmac-replay-date
          uri: /hello
          plugins: {hmac-auth: {clock_skew: 1000000000}}
          upstream: {type: roundrobin, nodes: {"{{FIXTURE.primary.ADDR}}": 1}}
    fixtures:
      - name: primary
        kind: http
        expect: [{method: GET, path: {equals: /hello}}]
        respond: [{status: 200, body: hello world}]
    steps:
      - name: original-date-and-signature-are-valid
        input:
          path: /hello
          headers:
            Date: 'Thu, 24 Sep 2020 06:39:52 GMT'
            Authorization: 'Signature keyId="my-access-key",algorithm="hmac-sha256",headers="date",signature="hbA3Tpvi6RtWrEfNaVzWWFBEWkCBniQZW0nc5SD5P2c="'
        output: {status: 200, body: {equals: hello world}}
      - name: changing-only-date-rejects-replayed-authorization
        input:
          path: /hello
          headers:
            Date: 'Thu, 24 Sep 2020 06:40:52 GMT'
