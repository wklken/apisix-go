cases:
    - config:
        routes:
            - id: http-dubbo-source-1
              plugins:
                http-dubbo:
                    method: echo
                    service_name: integration.Service
              upstream:
                nodes:
                    '{{FIXTURE.primary.ADDR}}': 1
                type: roundrobin
              uri: /probe
