      name: http-dubbo-source-1
      source:
        file: t/plugin/http-dubbo.t
        tests:
            - 1
            - 2
            - 3
            - 4
            - 5
      steps:
        - input:
            method: GET
            path: /probe
          name: dubbo-request-is-serialized-and-decoded
          output:
            body: {equals: response}
            status: 200
