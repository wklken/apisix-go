cases:
    - config:
        routes:
            - id: http-logger-source-1
              plugins:
                http-logger:
                    batch_max_size: 1
                    inactive_timeout: 1
                    uri: '{{FIXTURE.sink.URL}}/logs'
              upstream:
                nodes:
                    '{{FIXTURE.primary.ADDR}}': 1
                type: roundrobin
              uri: /probe
      fixtures:
        - kind: http
          name: primary
          respond:
            - body: hello world
              headers: {}
              status: 200
        - kind: http
          name: sink
          expect:
            - method: POST
              path: {matches: '.*'}
          respond:
            - body: ok
              headers: {}
              status: 200
      name: http-logger-source-1
      source:
        file: t/plugin/http-logger-json.t
        tests:
            - 1
            - 2
            - 3
            - 4
            - 5
            - 6
            - 7
            - 8
      steps:
        - input:
            method: GET
            path: /probe
          name: log-delivered-to-sink
          output:
            body:
                equals: hello world
            status: 200
          wait: 2s
