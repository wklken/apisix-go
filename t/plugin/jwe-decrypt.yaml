    fixtures: *hello_fixture
    steps:
      - name: created-consumer-decrypts-token
        input:
          path: /consumer-created
          headers:
            Authorization: "eyJraWQiOiJ1c2VyLWtleSIsImFsZyI6ImRpciIsImVuYyI6IkEyNTZHQ00ifQ..MTIzNDU2Nzg5MDEy.6JeRgm0.rNt131nG5wMvUD1KXbwLGA"
        output:
          status: 200
          body: {equals: hello world}

  - name: encrypted-consumer-fields
    source:
      tests: [7]
    runtime:
      apisix:
        data_encryption:
          enable_encrypt_fields: true
          keyring: [qeddd145sfvddff3]
    config:
      consumers:
        - username: jack
          plugins:
            jwe-decrypt:
              key: XU29sA3FEVF68hGcdPo7sg==
              secret: f9pGB0Dt4gYNCLKiINPfVSviKjQs2zfkBCT4+XZ3mDABZkJTr0orzYRD5CptDKMc
      routes:
        - id: jwe-decrypt-encrypted-consumer
          uri: /encrypted-consumer
          plugins:
            jwe-decrypt: {header: Authorization, forward_header: Authorization}
          upstream:
            type: roundrobin
            nodes: {"{{FIXTURE.primary.ADDR}}": 1}
    fixtures: *hello_fixture
    steps:
      - name: encrypted-key-and-secret-are-resolved
        input:
          path: /encrypted-consumer
          headers:
            Authorization: "eyJraWQiOiJ1c2VyLWtleSIsImFsZyI6ImRpciIsImVuYyI6IkEyNTZHQ00ifQ..MTIzNDU2Nzg5MDEy.6JeRgm0.rNt131nG5wMvUD1KXbwLGA"
        output:
          status: 200
          body: {equals: hello world}

  - name: protected-route-enabled
