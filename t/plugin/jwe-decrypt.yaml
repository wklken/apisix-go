  - name: consumer-replacement-lifecycle
    source:
      tests: [15]
    config:
      consumers: *raw_consumers
      routes:
        - id: jwe-decrypt-consumer-lifecycle
          uri: /hello
          plugins:
            jwe-decrypt: {header: Authorization, forward_header: Authorization}
          upstream:
            type: roundrobin
            nodes: {"{{FIXTURE.primary.ADDR}}": 1}
    fixtures:
      - name: primary
        kind: http
        respond:
          - {status: 200, body: jack before deletion}
          - {status: 200, body: chen after reload}
    steps:
      - name: jack-succeeds-before-deletion
        input:
          path: /hello
          headers:
            Authorization: "eyJraWQiOiJ1c2VyLWtleSIsImFsZyI6ImRpciIsImVuYyI6IkEyNTZHQ00ifQ..MTIzNDU2Nzg5MDEy.6JeRgm0.rNt131nG5wMvUD1KXbwLGA"
        output:
          status: 200
          body: {equals: jack before deletion}
      - name: replace-jack-with-chen
        config:
          consumers:
            - username: chen
              plugins:
                jwe-decrypt:
                  key: chen-key
                  secret: "12345678901234567890123456789021"
          routes:
            - id: jwe-decrypt-consumer-lifecycle
              uri: /hello
              plugins:
                jwe-decrypt: {header: Authorization, forward_header: Authorization}
              upstream:
                type: roundrobin
                nodes: {"{{FIXTURE.primary.ADDR}}": 1}
            - id: jwe-decrypt-consumer-reload-probe
              uri: /jwe-reload-ready
              plugins:
                jwe-decrypt: {header: Authorization, forward_header: Authorization}
                mocking:
                  _meta: {priority: -1000}
                  response_status: 204
                  response_example: ready
        config_probe:
          input:
            path: /jwe-reload-ready
            headers:
              Authorization: "eyJhbGciOiJkaXIiLCJraWQiOiJjaGVuLWtleSIsImVuYyI6IkEyNTZHQ00ifQ..MTIzNDU2Nzg5MDEy.ar0vE2I.AOndbhR7J1e2oM3N2c-KYQ"
          output:
            status: 204
        config_timeout: 2s
        input:
          path: /hello
          headers:
            Authorization: "eyJraWQiOiJ1c2VyLWtleSIsImFsZyI6ImRpciIsImVuYyI6IkEyNTZHQ00ifQ..MTIzNDU2Nzg5MDEy.6JeRgm0.rNt131nG5wMvUD1KXbwLGA"
        output:
          status: 400
          body: {matches: 'invalid kid in JWE token'}
      - name: chen-succeeds-after-reload
        input:
          path: /hello
          headers:
            Authorization: "eyJhbGciOiJkaXIiLCJraWQiOiJjaGVuLWtleSIsImVuYyI6IkEyNTZHQ00ifQ..MTIzNDU2Nzg5MDEy.ar0vE2I.AOndbhR7J1e2oM3N2c-KYQ"
        output:
          status: 200
          body: {equals: chen after reload}

