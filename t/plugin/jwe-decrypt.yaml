source:
  repository: https://github.com/apache/apisix
  commit: c3d7d5ec69774121f53d2e20d29d09c816795dd7
  file: t/plugin/jwe-decrypt.t
  tests: 23

cases:
  - name: valid-consumer-schema-sanity
    source:
      tests: [1]
    config:
      consumers: &raw_consumers
        - username: jack
          plugins:
            jwe-decrypt:
              key: user-key
              secret: "12345678901234567890123456789012"
      routes:
        - id: jwe-decrypt-schema-sanity
          uri: /schema-sanity
          plugins:
            jwe-decrypt: {header: Authorization, forward_header: Authorization}
          upstream:
            type: roundrobin
            nodes: {"{{FIXTURE.primary.ADDR}}": 1}
    fixtures: &hello_fixture
      - name: primary
        kind: http
        respond: [{status: 200, body: hello world}]
    steps:
      - name: valid-consumer-is-indexed
        input:
          path: /schema-sanity
          headers:
            Authorization: "eyJraWQiOiJ1c2VyLWtleSIsImFsZyI6ImRpciIsImVuYyI6IkEyNTZHQ00ifQ..MTIzNDU2Nzg5MDEy.6JeRgm0.rNt131nG5wMvUD1KXbwLGA"
        output:
          status: 200
          body: {equals: hello world}

  - name: consumer-key-type-diagnostic
    source:
      tests: [2]
    config:
      consumers:
        - username: jack
          plugins:
            jwe-decrypt:
              key: 123
              secret: "12345678901234567890123456789012"
    output:
      logs: {matches: 'jwe-decrypt consumer key must be a string'}

  - name: consumer-secret-type-diagnostic
    source:
      tests: [3]
    config:
      consumers:
        - username: jack
          plugins:
            jwe-decrypt:
              key: user-key
              secret: 123
    output:
      logs: {matches: 'jwe-decrypt consumer secret must be a string'}

  - name: raw-secret-length-diagnostic
    source:
      tests: [4]
    config:
      consumers:
        - username: jack
          plugins:
            jwe-decrypt:
              key: user-key
              secret: "123456789012345678901234567890123"
    output:
      logs: {matches: 'the secret length should be 32 chars'}

  - name: base64-secret-length-diagnostic
    source:
      tests: [5]
    config:
      consumers:
        - username: jack
          plugins:
            jwe-decrypt:
              key: user-key
              secret: MTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIz
              is_base64_encoded: true
    output:
      logs: {matches: 'the secret length after base64 decode should be 32 chars'}

