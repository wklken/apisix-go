- name: test-013-valid-consumer
  source:
    file: t/plugin/key-auth.t
    tests:
    - 13
  config:
    routes:
    - plugins:
        key-auth:
          query: auth
      upstream:
        nodes:
          '{{UPSTREAM_ADDR}}': 1
        type: roundrobin
      uri: /hello
      id: key-auth-12
    consumers:
    - username: jack
      plugins:
        key-auth:
          key: auth-one
    - username: error
      plugins:
        key-auth: {}
  input:
    method: GET
    path: /hello?auth=auth-one
  upstream:
    respond:
      status: 200
      body: hello world
  output:
    status: 200
    body:
      equals: hello world
