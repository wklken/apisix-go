        input:
          method: GET
          path: "/echo?auth=auth-one&test=auth-two"
        output:
          status: 200
          body:
            equals: "hello world"
      - name: key-auth-023-when-auth-both-in-header-and-query-string-verify-auth-request-arg
        input:
          method: GET
          path: "/echo?auth=auth-one"
          headers:
            auth: auth-one
        output:
          status: 200
          body:
            equals: "hello world"
          headers:
            auth:
              equals: auth-one
      - name: key-auth-024-customize-query-string-set-hide-credentials-false
