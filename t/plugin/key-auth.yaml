        output:
          status: 200
          body:
            equals: "hello world"
      - name: key-auth-014-enable-key-auth-plugin-using-admin-api-set-hide-credentials-false
        input:
          method: GET
          path: "/echo"
        output:
          status: 200
          body:
            equals: "hello world"
      - name: key-auth-015-verify-apikey-request-header-should-not-hidden
        input:
          method: GET
          path: "/echo"
          headers:
            apikey: auth-one
        output:
          status: 200
          body:
            equals: "hello world"
          headers:
            apikey:
              equals: auth-one
      - name: key-auth-016-add-key-auth-plugin-using-admin-api-set-hide-credentials-true
        input:
          method: GET
          path: "/echo"
        output:
          status: 200
          body:
            equals: "hello world"
      - name: key-auth-017-verify-apikey-request-header-is-hidden
        input:
          method: GET
          path: "/echo"
          headers:
            apikey: auth-one
        output:
          status: 200
          body:
            equals: "hello world"
      - name: key-auth-018-verify-that-only-the-keys-in-the-title-are-deleted
        input:
          method: GET
          path: "/echo"
          headers:
            apikey: auth-one
            test: auth-two
        output:
          status: 200
          body:
            equals: "hello world"
          headers:
            test:
              equals: auth-two
      - name: key-auth-019-when-apikey-both-in-header-and-query-string-verify-apikey-request
        input:
          method: GET
          path: "/echo?apikey=auth-one"
          headers:
