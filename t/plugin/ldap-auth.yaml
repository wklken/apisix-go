cases:
    - config:
        consumers:
            - username: ldap-user
              plugins:
                ldap-auth:
                    user_dn: cn=alice,dc=example,dc=org
        routes:
            - id: ldap-auth-source-1
              plugins:
                ldap-auth:
                    base_dn: dc=example,dc=org
                    ldap_uri: '{{FIXTURE.ldap.URL}}'
                    use_tls: false
              upstream:
                nodes:
                    '{{FIXTURE.primary.ADDR}}': 1
                type: roundrobin
              uri: /probe
      fixtures:
        - kind: http
          name: primary
          respond:
            - body: hello world
              headers: {}
              status: 200
        - kind: ldap
          name: ldap
          network_expect:
            - payload_base64: {matches: '^MC'}
          network_respond:
            - payload: ''
      name: ldap-auth-source-1
      source:
        file: t/plugin/ldap-auth-realm.t
        tests:
            - 1
            - 2
            - 3
            - 4
            - 5
            - 6
            - 7
      steps:
        - input:
            headers:
                Authorization: Basic YWxpY2U6c2VjcmV0
            method: GET
            path: /probe
          name: ldap-bind-authenticates-consumer
          output:
            body: {equals: hello world}
            status: 200
