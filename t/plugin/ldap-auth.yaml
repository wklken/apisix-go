cases:
    - config:
        routes:
            - id: ldap-auth-source-1
              plugins:
                ldap-auth:
                    base_dn: dc=example,dc=org
                    ldap_uri: ldap://127.0.0.1:1
                    use_tls: false
              upstream:
                nodes:
                    '{{FIXTURE.primary.ADDR}}': 1
                type: roundrobin
              uri: /probe
      fixtures:
        - kind: http
          name: primary
          respond:
            - body: hello world
              headers: {}
              status: 200
