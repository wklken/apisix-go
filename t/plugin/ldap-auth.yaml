        input:
          method: GET
          path: "/hello"
          headers:
            Authorization: "Basic dXNlcjp3cm9uZw=="
        output:
          status: 401
          body:
            equals: "validation failed"
          headers:
            WWW-Authenticate:
              equals: "Basic realm=\"my-ldap-realm\""
