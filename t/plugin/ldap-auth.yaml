            body: "validation failed"
    steps:
      - name: ldap-auth-realm-001-sanity-default-realm
        input:
          method: GET
          path: "/hello"
        output:
          status: 200
          body:
            equals: "hello world"
      - name: ldap-auth-realm-002-verify-default-realm
