              equals: "Basic realm=\"my-ldap-realm\""
      - name: ldap-auth-realm-005-ldap-auth-failure-missing-header-returns-realm
        input:
          method: GET
          path: "/hello"
        output:
          status: 401
          body:
            equals: "validation failed"
          headers:
            WWW-Authenticate:
              equals: "Basic realm=\"my-ldap-realm\""
      - name: ldap-auth-realm-006-ldap-auth-failure-invalid-credentials-returns-realm
        input:
          method: GET
          path: "/hello"
        output:
          status: 200
          body:
