          upstream: {type: roundrobin, nodes: {"{{FIXTURE.primary.ADDR}}": 1}}
    fixtures:
      - name: primary
        kind: http
        respond: [{status: 200, body: limit-count upstream}]
    steps:
      - name: first-request
        input: {method: GET, path: /limit-count, headers: {}}
        output:
          status: 200
          body: {equals: limit-count upstream}
          headers:
            X-RateLimit-Limit: {equals: "2"}
      - name: second-request
        input: {method: GET, path: /limit-count, headers: {}}
        output:
