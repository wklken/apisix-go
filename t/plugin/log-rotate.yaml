cases:
    - config:
        routes:
            - id: log-rotate-source-1
              plugins:
                log-rotate:
                    access_log: '{{WORK_DIR}}/logs/access.log'
                    error_log: '{{WORK_DIR}}/logs/error.log'
                    max_kept: 2
                    max_size: 1
                file-logger:
                    log_format:
                        path: $uri
                    path: '{{WORK_DIR}}/logs/access.log'
              upstream:
                nodes:
                    '{{FIXTURE.primary.ADDR}}': 1
                type: roundrobin
              uri: /probe
      fixtures:
        - kind: http
          name: primary
          respond:
            - body: hello world
              headers: {}
              status: 200
      name: log-rotate-source-1
      source:
        file: t/plugin/log-rotate.t
        tests:
            - 1
            - 2
            - 3
            - 4
            - 5
            - 6
      steps:
        - input:
            method: GET
            path: /probe
          name: access-log-is-written
          output:
            body:
                equals: hello world
            status: 200
          repeat: 2
      after_shutdown:
        - path: {equals: '{{WORK_DIR}}/logs/access.log'}
          body: {matches: '"path":"/probe"'}
