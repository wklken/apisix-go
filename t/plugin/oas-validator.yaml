      - name: oas-validator-004-test-body-validation-post
        input:
          method: GET
          path: "/api/v3/pet"
          body: "{\"id\": 10, \"name\": \"doggie\", \"category\": {\"id\": 1, \"name\": \"Dogs\"}, \"photoUrls\": [\"string\"], \"tags\": [{\"id\": 1, \"name\": \"tag1\"}], \"status\": \"available\"}"
          headers:
            Content-Type: application/json
        output:
          status: 200
          body:
            equals: "hello world"
      - name: oas-validator-005-test-body-validation-put
        input:
          method: GET
          path: "/api/v3/pet"
          body: "{\"id\": 10, \"name\": \"doggie\", \"category\": { \"id\": 1, \"name\": \"Dogs\"}, \"photoUrls\": [ \"string\"], \"tags\": [{ \"id\": 0, \"name\": \"string\"}], \"status\": \"available\"}"
          headers:
            Content-Type: application/json
        output:
          status: 200
          body:
            equals: "hello world"
      - name: oas-validator-006-passing-incorrect-body-should-fail
        input:
          method: GET
          path: "/api/v3/pet"
          body: "{\"lol\": \"watdis?\"}"
          headers:
            Content-Type: application/json
        output:
          status: 400
          body:
            equals: "validation failed"
      - name: oas-validator-007-test-body-validation-with-query-params
        input:
          method: GET
          path: "/api/v3/pet/findByStatus?status=pending"
          headers:
            Content-Type: application/json
        output:
          status: 200
          body:
            equals: "hello world"
      - name: oas-validator-008-querying-for-married-dogs-should-fail-incorrect-query-param
        input:
          method: GET
          path: "/api/v3/pet/findByStatus?status=married"
          headers:
