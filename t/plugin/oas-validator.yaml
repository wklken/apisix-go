          - {method: GET, path: {equals: /api/v31/pet/42}, headers: {Content-Type: {equals: application/json}}}
          - {method: GET, path: {equals: '/api/v31/pet/findByStatus?status=available'}, headers: {Content-Type: {equals: application/json}}}
