          - {method: POST, path: {equals: /api/v31/nullable}, headers: {Content-Type: {equals: application/json}}, body: {equals: '{"value": "hello"}'}}
          - {method: POST, path: {equals: /api/v31/const}, headers: {Content-Type: {equals: application/json}}, body: {equals: '{"version": "v1"}'}}
          - {method: POST, path: {equals: /api/v31/multipleoftest}, headers: {Content-Type: {equals: application/json}}, body: {equals: '{"testnumber": 1.13}'}}
        respond: [{status: 200, body: ok}]
    steps:
