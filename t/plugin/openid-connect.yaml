cases:
    - config:
        routes:
            - id: openid-connect-source-1
              plugins:
                openid-connect:
                    bearer_only: true
                    client_id: integration-client
                    discovery: http://127.0.0.1:1/.well-known/openid-configuration
                    introspection_endpoint: '{{FIXTURE.auth.URL}}/introspect'
                    ssl_verify: false
              upstream:
                nodes:
                    '{{FIXTURE.primary.ADDR}}': 1
                type: roundrobin
              uri: /probe
      fixtures:
        - kind: http
          name: primary
          expect:
            - method: GET
              path: {equals: /probe}
              headers:
                X-Access-Token: {equals: token}
          respond:
            - body: hello world
              headers: {}
              status: 200
        - kind: http
          name: auth
          expect:
            - method: POST
              path: {equals: /introspect}
              body: {matches: 'token=token'}
          respond:
            - body: '{"active":true,"sub":"integration"}'
              headers: {}
              status: 200
      name: openid-connect-source-1
      source:
        file: t/plugin/openid-connect-identity-headers.t
        tests:
            - 1
            - 2
            - 3
            - 4
      steps:
        - input:
            headers:
                Authorization: Bearer token
            method: GET
            path: /probe
          name: bearer-introspection-attaches-identity
          output:
            body: {equals: hello world}
            status: 200
