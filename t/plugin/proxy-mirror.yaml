        input:
          method: GET
          path: "/uri"
        output:
          status: 200
          body:
            equals: "hello world"
      - name: proxy-mirror-009-the-request-header-does-not-change
        input:
          method: GET
          path: "/uri"
          headers:
            host: "127.0.0.2"
            api-key: hello
            api-key2: world
            name: jake
        output:
          status: 200
          body:
            equals: "hello world"
      - name: proxy-mirror-010-sanity-check-normal-case-used-to-test-http-version
        input:
          method: GET
          path: "/hello"
        output:
          status: 200
          body:
            equals: "hello world"
      - name: proxy-mirror-011-after-the-mirroring-request-the-upstream-http-version-is-1-1
        input:
          method: GET
          path: "/hello"
          headers:
            host: "127.0.0.2"
            api-key: hello
        output:
          status: 200
          body:
            equals: "hello world"
      - name: proxy-mirror-012-delete-route
