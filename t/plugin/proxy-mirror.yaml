    steps:
      - name: proxy-mirror-001-sanity-check-invalid-schema
        input:
          method: GET
          path: "/hello"
        output:
          status: 400
          body:
            matches: "validation failed"
      - name: proxy-mirror-002-sanity-check-invalid-port-format
        input:
          method: GET
          path: "/hello"
        output:
          status: 400
          body:
            matches: "validation failed"
      - name: proxy-mirror-003-sanity-check-without-schema
        input:
          method: GET
          path: "/hello"
        output:
          status: 400
          body:
            matches: "validation failed"
      - name: proxy-mirror-004-sanity-check-without-port
        input:
          method: GET
          path: "/hello"
        output:
          status: 200
          body:
            equals: "hello world"
      - name: proxy-mirror-005-sanity-check-include-uri
        input:
          method: GET
          path: "/hello"
        output:
          status: 400
          body:
            matches: "validation failed"
      - name: proxy-mirror-006-sanity-check-normal-case
        input:
          method: GET
          path: "/hello"
        output:
          status: 200
          body:
