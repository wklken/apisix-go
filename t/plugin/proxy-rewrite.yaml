    skip: "upstream Test::Nginx case requires Lua/Admin API setup or an external dependency; preserved as a source-complete skip until a standalone fixture is available"
  - name: "proxy-rewrite2-test-008-pass-duplicate-x-forwarded-proto-but-not-configured-trusted-addresses"
    source:
