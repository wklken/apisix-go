    skip: "upstream Test::Nginx case requires Lua/Admin API setup or an external dependency; preserved as a source-complete skip until a standalone fixture is available"
  - name: "proxy-rewrite3-test-001-set-route-rewrite-method"
    source:
      file: t/plugin/proxy-rewrite3.t
      tests:
      - 1
    skip: "upstream Test::Nginx case requires Lua/Admin API setup or an external dependency; preserved as a source-complete skip until a standalone fixture is available"
  - name: "proxy-rewrite3-test-002-hit-route-upstream-uri-should-be-hello"
    source:
      file: t/plugin/proxy-rewrite3.t
      tests:
      - 2
    skip: "upstream Test::Nginx case requires Lua/Admin API setup or an external dependency; preserved as a source-complete skip until a standalone fixture is available"
  - name: "proxy-rewrite3-test-003-set-route-update-rewrite-method"
    source:
      file: t/plugin/proxy-rewrite3.t
      tests:
      - 3
    skip: "upstream Test::Nginx case requires Lua/Admin API setup or an external dependency; preserved as a source-complete skip until a standalone fixture is available"
