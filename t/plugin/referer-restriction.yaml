- name: test-011-hit-route-and-in-the-blacklist
  source:
    file: t/plugin/referer-restriction.t
    tests:
    - 11
  config:
    routes:
    - uri: /hello
      upstream:
        type: roundrobin
        nodes:
          '{{UPSTREAM_ADDR}}': 1
      plugins:
        referer-restriction:
          blacklist:
          - '*.xx.com'
          message: Your referer host is deny
      id: referer-restriction-10
  input:
    method: GET
    path: /hello
    headers:
      Referer: http://www.xx.com
  upstream:
    respond:
      status: 200
      body: hello world
  output:
    status: 403
    body:
      equals: '{"message":"Your referer host is deny"}'
