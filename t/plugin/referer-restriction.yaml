    tests:
    - 1
  skip: setup or schema-only source block is represented by standalone cases that follow
- name: test-002-hit-route-and-in-the-whitelist-wildcard
  source:
    file: t/plugin/referer-restriction.t
    tests:
    - 2
  config:
    routes:
    - uri: /hello
      upstream:
        type: roundrobin
        nodes:
          '{{UPSTREAM_ADDR}}': 1
      plugins:
        referer-restriction:
          whitelist:
          - '*.xx.com'
          - yy.com
      id: referer-restriction-1
  input:
    method: GET
    path: /hello
    headers:
      Referer: http://www.xx.com
  upstream:
    respond:
      status: 200
      body: hello world
  output:
    status: 200
    body:
      equals: hello world
