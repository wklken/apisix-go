    config: {routes: [{id: request-validation-body-integer, uri: /body-integer, plugins: {request-validation: {body_schema: {type: integer}}}, upstream: {type: roundrobin, nodes: {'{{UPSTREAM_ADDR}}': 1}}}]}
    input: {method: POST, path: /body-integer, headers: {Content-Type: application/json}, body: '3'}
