  - name: body-schema-invalid-required
    source: {file: t/plugin/request-validation.t, tests: [20]}
    config: {routes: [{id: request-validation-body-invalid-required, uri: /body-invalid-required, plugins: {request-validation: {body_schema: {type: object, properties: {test: {type: string, enum: [a, b, c]}}, required: test-required}}}, upstream: {type: roundrobin, nodes: {127.0.0.1:1980: 1}}}]}
    input: {method: GET, path: /body-invalid-required}
