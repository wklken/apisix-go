  - name: urlencoded-body-and-charset
    source: {file: t/plugin/request-validation.t, tests: [51, 52, 53]}
    config: {routes: [{id: request-validation-urlencoded, uri: /echo, plugins: {request-validation: {body_schema: {type: object, required: [required_payload], properties: {required_payload: {type: string}}}}}, upstream: {type: roundrobin, nodes: {'{{FIXTURE.primary.ADDR}}': 1}}}]}
    fixtures: [{name: primary, kind: http, expect: [{body: {matches: '^(a=b&){101}required_payload=101-hello$'}}, {body: {matches: '^(a=b&){101}required_payload=101-hello$'}}], respond: [{status: 200, echo_request_body: true}, {status: 200, echo_request_body: true}]}]
    steps:
      - {name: urlencoded-body, input: {method: POST, path: /echo, headers: {Content-Type: application/x-www-form-urlencoded}, body_repeat: {value: 'a=b&', count: 101, suffix: required_payload=101-hello}}, output: {status: 200, body: {matches: 101-hello}}}
      - {name: urlencoded-body-with-charset, input: {method: POST, path: /echo, headers: {Content-Type: 'application/x-www-form-urlencoded; charset=utf-8'}, body_repeat: {value: 'a=b&', count: 101, suffix: required_payload=101-hello}}, output: {status: 200, body: {matches: 101-hello}}}

  - name: duplicate-json-key-is-normalized
    source: {file: t/plugin/request-validation2.t, tests: [1, 2]}
