            - test
          rejected_code: 505
      upstream:
        nodes:
          '{{UPSTREAM_ADDR}}': 1
        type: roundrobin
      uri: /opentracing
      id: request-validation-45
  input:
    method: GET
    path: /opentracing
  upstream:
    respond:
      status: 200
      body: hello world
  output:
    status: 505
