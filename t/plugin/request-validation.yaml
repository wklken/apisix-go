  - name: body-required-custom-code
    source: {file: t/plugin/request-validation.t, tests: [45, 46, 47, 48]}
    config: {routes: [{id: request-validation-body-custom-code, uri: /body-custom-code, plugins: {request-validation: {body_schema: {type: object, properties: {test: {type: string, enum: [a, b, c]}}, required: [test]}, rejected_code: 505}}, upstream: {type: roundrobin, nodes: {'{{FIXTURE.primary.ADDR}}': 1}}}]}
    fixtures: [{name: primary, kind: http, respond: [{status: 200, body: hello world}]}]
    steps:
      - {name: empty-body-uses-custom-code, input: {method: GET, path: /body-custom-code}, output: {status: 505}}
      - {name: invalid-body-uses-custom-code, input: {method: POST, path: /body-custom-code, headers: {Content-Type: application/json}, body: '{"test":"abc"}'}, output: {status: 505}}
      - {name: valid-body-passes, input: {method: POST, path: /body-custom-code, headers: {Content-Type: application/json}, body: '{"test":"a"}'}, output: {status: 200, body: {equals: hello world}}}

  - name: header-custom-code-out-of-range
    source: {file: t/plugin/request-validation.t, tests: [49]}
    config: {routes: [{id: request-validation-header-invalid-code, uri: /header-invalid-code, plugins: {request-validation: {header_schema: {type: object, properties: {test: {type: string, enum: [a, b, c]}}, required: [test]}, rejected_code: 10000}}, upstream: {type: roundrobin, nodes: {127.0.0.1:1980: 1}}}]}
    input: {method: GET, path: /header-invalid-code}
    output: {status: 404, logs: {matches: request-validation}}

  - name: custom-code-without-schema-is-rejected
    source: {file: t/plugin/request-validation.t, tests: [50]}
    config: {routes: [{id: request-validation-code-only, uri: /code-only, plugins: {request-validation: {rejected_code: 505}}, upstream: {type: roundrobin, nodes: {127.0.0.1:1980: 1}}}]}
    input: {method: GET, path: /code-only}
