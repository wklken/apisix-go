                  timeouts: {type: integer, minimum: 1, maximum: 254, default: 3}
                  req_headers: {type: array, minItems: 1, items: {type: string}}
          upstream: {type: roundrobin, nodes: {'{{UPSTREAM_ADDR}}': 1}}
    input: {method: GET, path: /header-full, headers: {required_payload: payload}}
    upstream: {respond: {status: 200, body: ok}}
    output: {status: 200, body: {equals: ok}}

  - name: header-schema-object
