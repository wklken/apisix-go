      - {name: bad-body-is-rejected, input: {method: POST, path: /body-custom, headers: {Content-Type: application/json}, body: '{"test":"abc"}'}, output: {status: 400, body: {matches: '^customize reject message for body_schema.required\n$'}}}
      - {name: valid-body-is-accepted, input: {method: POST, path: /body-custom, headers: {Content-Type: application/json}, body: '{"test":"a"}'}, output: {status: 200, body: {equals: hello world}}}

  - name: header-custom-message-too-long
