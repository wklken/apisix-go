    input: {method: GET, path: /header-required, headers: {test: a}}
    upstream: {respond: {status: 200, body: ok}}
    output: {status: 200, body: {equals: ok}}

  - name: header-required-custom-message
    source: {file: t/plugin/request-validation.t, tests: [35, 36, 37, 38]}
    config: {routes: [{id: request-validation-header-custom, uri: /header-custom, plugins: {request-validation: {header_schema: {type: object, properties: {test: {type: string, enum: [a, b, c]}}, required: [test]}, rejected_msg: customize reject message for header_schema.required}}, upstream: {type: roundrobin, nodes: {'{{FIXTURE.primary.ADDR}}': 1}}}]}
    fixtures: [{name: primary, kind: http, respond: [{status: 200, body: hello world}]}]
    steps:
      - {name: empty-header-is-rejected, input: {method: GET, path: /header-custom}, output: {status: 400, body: {matches: '^customize reject message for header_schema.required\n$'}}}
      - {name: bad-header-is-rejected, input: {method: GET, path: /header-custom, headers: {test: abc}}, output: {status: 400, body: {matches: '^customize reject message for header_schema.required\n$'}}}
      - {name: valid-header-is-accepted, input: {method: GET, path: /header-custom, headers: {test: a}}, output: {status: 200, body: {equals: hello world}}}

  - name: body-required-custom-message
    source: {file: t/plugin/request-validation.t, tests: [39, 40, 41, 42]}
    config: {routes: [{id: request-validation-body-custom, uri: /body-custom, plugins: {request-validation: {body_schema: {type: object, properties: {test: {type: string, enum: [a, b, c]}}, required: [test]}, rejected_msg: customize reject message for body_schema.required}}, upstream: {type: roundrobin, nodes: {'{{FIXTURE.primary.ADDR}}': 1}}}]}
