  - name: body-schema-required
    source: {file: t/plugin/request-validation.t, tests: [21]}
    config:
      routes:
        - id: request-validation-body-required
          uri: /body-required
          plugins:
            request-validation:
              body_schema:
                type: object
                properties: {test: {type: string, enum: [a, b, c]}}
                required: [test]
          upstream: {type: roundrobin, nodes: {'{{UPSTREAM_ADDR}}': 1}}
    input: {method: POST, path: /body-required, headers: {Content-Type: application/json}, body: '{"test":"a"}'}
    upstream: {respond: {status: 200, body: ok}}
    output: {status: 200, body: {equals: ok}}

  - name: full-header-schema-config-is-active
