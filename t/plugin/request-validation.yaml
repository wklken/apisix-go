sources:
  - {repository: https://github.com/apache/apisix, commit: c3d7d5ec69774121f53d2e20d29d09c816795dd7, file: t/plugin/request-validation.t, tests: 53}
  - {repository: https://github.com/apache/apisix, commit: c3d7d5ec69774121f53d2e20d29d09c816795dd7, file: t/plugin/request-validation2.t, tests: 2}
cases:
  - name: empty-body-schema-is-valid
    source: {file: t/plugin/request-validation.t, tests: [1]}
    config:
      routes:
        - id: request-validation-empty-body-schema
          uri: /empty-body-schema
          plugins: {request-validation: {body_schema: {}}}
          upstream: {type: roundrobin, nodes: {'{{UPSTREAM_ADDR}}': 1}}
    input: {method: POST, path: /empty-body-schema, headers: {Content-Type: application/json}, body: '{"anything":true}'}
    upstream: {expect: {body: {equals: '{"anything":true}'}}, respond: {status: 200, body: ok}}
    output: {status: 200, body: {equals: ok}}

  - name: missing-header-and-body-schema-is-rejected
    source: {file: t/plugin/request-validation.t, tests: [2]}
    config:
      routes:
        - id: request-validation-missing-schema
          uri: /missing-schema
          plugins: {request-validation: {}}
          upstream: {type: roundrobin, nodes: {127.0.0.1:1980: 1}}
    input: {method: GET, path: /missing-schema}
    output: {status: 404, logs: {matches: request-validation}}

  - name: body-schema-all-combinations
    source: {file: t/plugin/request-validation.t, tests: [3, 4, 5]}
    config:
      routes:
        - id: request-validation-body-combinations
          uri: /opentracing
          plugins:
            request-validation:
              body_schema:
                type: object
                required: [required_payload]
                properties:
                  required_payload: {type: string}
                  boolean_payload: {type: boolean}
                  timeouts: {type: integer, minimum: 1, maximum: 254, default: 3}
                  req_headers: {type: array, minItems: 1, items: {type: string}}
          upstream: {type: roundrobin, nodes: {'{{FIXTURE.primary.ADDR}}': 1}}
    fixtures: [{name: primary, kind: http, expect: [{body: {matches: 'required_payload.*hello'}}], respond: [{status: 200, body: hello world}]}]
    steps:
      - {name: required-payload-missing, input: {method: POST, path: /opentracing, headers: {Content-Type: application/json}, body: '{"boolean-payload":true}'}, output: {status: 400, body: {matches: required_payload}}}
      - {name: required-payload-added, input: {method: POST, path: /opentracing, headers: {Content-Type: application/json}, body: '{"boolean-payload":true,"required_payload":"hello"}'}, output: {status: 200, body: {equals: hello world}}}

  - name: header-schema-all-combinations
    source: {file: t/plugin/request-validation.t, tests: [6, 7, 8]}
    config:
      routes:
        - id: request-validation-header-combinations
          uri: /header-combinations
          plugins:
            request-validation:
              header_schema:
                type: object
                required: [required_payload]
                properties:
                  required_payload: {type: string}
                  boolean_payload: {type: boolean}
                  timeouts: {type: integer, minimum: 1, maximum: 254, default: 3}
                  req_headers: {type: array, minItems: 1, items: {type: string}}
          upstream: {type: roundrobin, nodes: {'{{FIXTURE.primary.ADDR}}': 1}}
    fixtures: [{name: primary, kind: http, respond: [{status: 200, body: hello world}]}]
    steps:
      - {name: required-header-missing, input: {method: GET, path: /header-combinations, headers: {Content-Type: application/json}}, output: {status: 400, body: {matches: required_payload}}}
      - {name: required-header-present, input: {method: GET, path: /header-combinations, headers: {Content-Type: application/json, required_payload: test payload}}, output: {status: 200, body: {equals: hello world}}}

  - name: full-body-schema-config-is-active
    source: {file: t/plugin/request-validation.t, tests: [9]}
    config:
      routes:
        - id: request-validation-body-full
          uri: /body-full
          plugins:
            request-validation:
              body_schema:
                type: object
                required: [required_payload]
                properties:
                  required_payload: {type: string}
                  boolean_payload: {type: boolean}
                  timeouts: {type: integer, minimum: 1, maximum: 254, default: 3}
                  req_headers: {type: array, minItems: 1, items: {type: string}}
          upstream: {type: roundrobin, nodes: {'{{UPSTREAM_ADDR}}': 1}}
    input: {method: POST, path: /body-full, headers: {Content-Type: application/json}, body: '{"required_payload":"payload","boolean_payload":true,"timeouts":3,"req_headers":["X-Test"]}'}
    upstream: {respond: {status: 200, body: ok}}
    output: {status: 200, body: {equals: ok}}

