    config: {routes: [{id: request-validation-body-table, uri: /body-table, plugins: {request-validation: {body_schema: {type: table}}}, upstream: {type: roundrobin, nodes: {'{{UPSTREAM_ADDR}}': 1}}}]}
    input: {method: POST, path: /body-table, headers: {Content-Type: application/json}, body: '{"table":"value"}'}
