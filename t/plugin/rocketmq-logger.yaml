cases:
    - config:
        routes:
            - id: rocketmq-logger-source-1
              plugins:
                rocketmq-logger:
                    batch_max_size: 1
                    buffer_duration: 1
                    inactive_timeout: 1
                    max_retry_count: 0
                    nameserver_list:
                        - '{{FIXTURE.sink.ADDR}}'
                    timeout: 1
                    topic: integration
              upstream:
                nodes:
                    '{{FIXTURE.primary.ADDR}}': 1
                type: roundrobin
              uri: /probe
      fixtures:
        - kind: http
          name: primary
          respond:
            - body: hello world
              headers: {}
              status: 200
        - kind: tcp
          name: sink
          network_expect:
            - payload:
                matches: .*
          network_respond:
            - payload: ok
      name: rocketmq-logger-source-1
      source:
        file: t/plugin/rocketmq-logger-log-format.t
        tests:
            - 1
            - 2
            - 3
            - 4
            - 5
      steps:
        - input:
            method: GET
            path: /probe
          name: real-plugin-probe
          output:
            body:
                equals: hello world
            status: 200
          wait: 2s
