cases:
    - config:
        routes:
            - id: saml-auth-source-1
              plugins:
                saml-auth:
                    idp_cert: invalid
                    idp_uri: http://127.0.0.1:1/sso
                    login_callback_uri: http://example.org/callback
                    logout_callback_uri: http://example.org/logout/callback
                    logout_redirect_uri: http://example.org/
                    logout_uri: http://127.0.0.1:1/logout
                    secret: integration-secret
                    sp_cert: invalid
                    sp_issuer: http://example.org/sp
                    sp_private_key: invalid
              upstream:
                nodes:
                    '{{FIXTURE.primary.ADDR}}': 1
                type: roundrobin
              uri: /probe
      fixtures:
        - kind: http
          name: primary
          respond:
            - body: hello world
              headers: {}
              status: 200
