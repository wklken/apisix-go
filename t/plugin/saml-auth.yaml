          - name: primary
            kind: http
            respond:
                - status: 200
                  headers: {}
                  body: saml upstream
      steps:
          - name: HTTP-POST binding emits an auto-submit SAML form
            input:
                method: GET
                path: /probe
            output:
                status: 200
                headers:
                    Content-Type:
                        matches: text/html; charset=utf-8
                body:
                    matches: 'SAMLRequest'

    - name: saml-auth-post-invalid-callback
      source:
          file: t/plugin/saml-auth-post.t
          tests: [3, 4, 5, 6]
      config:
          routes:
              - id: saml-auth-post-invalid-callback
                uri: /*
                plugins:
                    saml-auth:
                        sp_issuer: integration-sp
                        idp_uri: https://idp.example.test/sso
                        idp_cert: *saml_cert
                        login_callback_uri: /login/callback
                        logout_uri: /logout
                        logout_callback_uri: /logout/callback
                        logout_redirect_uri: /logged-out
                        sp_cert: *saml_cert
                        sp_private_key: *saml_key
                        auth_protocol_binding_method: HTTP-POST
                        secret: integration-secret
                upstream:
                    type: roundrobin
                    nodes:
                        '{{FIXTURE.primary.ADDR}}': 1
      fixtures:
          - name: primary
            kind: http
            respond:
                - status: 200
                  headers: {}
                  body: saml upstream
      steps:
          - name: invalid callback state is rejected
            input:
                method: POST
                path: /login/callback
                headers:
                    Content-Type: application/x-www-form-urlencoded
                body: SAMLResponse=bad
            output:
                status: 401
                body:
                    matches: invalid callback state

    - name: saml-auth-redirect-login
      source:
          file: t/plugin/saml-auth.t
          tests: [1, 2, 3, 4, 5, 6, 7]
      config:
          routes:
              - id: saml-auth-redirect-login
                uri: /*
                plugins:
                    saml-auth:
                        sp_issuer: integration-sp
                        idp_uri: https://idp.example.test/sso
                        idp_cert: *saml_cert
                        login_callback_uri: /login/callback
                        logout_uri: /logout
                        logout_callback_uri: /logout/callback
                        logout_redirect_uri: /logged-out
                        sp_cert: *saml_cert
                        sp_private_key: *saml_key
                        secret: integration-secret
                upstream:
                    type: roundrobin
                    nodes:
                        '{{FIXTURE.primary.ADDR}}': 1
      fixtures:
          - name: primary
            kind: http
            respond:
                - status: 200
                  headers: {}
                  body: saml upstream
      steps:
          - name: redirect binding starts IdP login
            input:
                method: GET
                path: /probe
            output:
                status: 302
                headers:
                    Location:
                        matches: '^https://idp\.example\.test/sso\?.*SAMLRequest=.*RelayState=.*'
                body:
                    matches: 'Found'

    - name: saml-auth-logout-and-callback
      source:
          file: t/plugin/saml-auth.t
          tests: [8, 9, 10, 11, 12, 13, 14, 15]
      config:
          routes:
              - id: saml-auth-logout-and-callback
                uri: /*
                plugins:
                    saml-auth:
                        sp_issuer: integration-sp
                        idp_uri: https://idp.example.test/sso
                        idp_cert: *saml_cert
                        login_callback_uri: /login/callback
                        logout_uri: /logout
                        logout_callback_uri: /logout/callback
                        logout_redirect_uri: /logged-out
                        sp_cert: *saml_cert
                        sp_private_key: *saml_key
                        secret: integration-secret
                upstream:
                    type: roundrobin
                    nodes:
                        '{{FIXTURE.primary.ADDR}}': 1
      fixtures:
          - name: primary
            kind: http
            respond:
                - status: 200
                  headers: {}
                  body: saml upstream
      steps:
          - name: logout without session redirects to configured target
            input:
                method: GET
                path: /logout
            output:
                status: 302
                headers:
                    Location:
                        equals: /logged-out
          - name: callback without signed state is rejected
            input:
                method: POST
                path: /login/callback
                headers:
                    Content-Type: application/x-www-form-urlencoded
                body: SAMLResponse=bad
            output:
                status: 401
                body:
                    matches: invalid callback state

