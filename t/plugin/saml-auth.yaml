        tests: [1, 2]
      config:
        routes:
            - id: saml-auth-post-schema-and-login
              uri: /*
              plugins:
                  saml-auth:
                      sp_issuer: integration-sp
                      idp_uri: https://idp.example.test/sso
                      idp_cert: &saml_cert |
                          -----BEGIN CERTIFICATE-----
                          MIICIDCCAYmgAwIBAgIUYCXLeJPz69bdMDcfhEklovNXoHQwDQYJKoZIhvcNAQEL
