- name: test-007-hit-route-and-user-agent-in-denylist
  source:
    file: t/plugin/ua-restriction.t
    tests:
    - 7
  config:
    routes:
    - uri: /hello
      upstream:
        type: roundrobin
        nodes:
          '{{UPSTREAM_ADDR}}': 1
      plugins:
        ua-restriction:
          denylist:
          - my-bot1
          - (Baiduspider)/(\d+)\.(\d+)
      id: ua-restriction-6
  input:
    method: GET
    path: /hello
    headers:
      User-Agent: my-bot1
  upstream:
    respond:
      status: 200
      body: hello world
  output:
    status: 403
    body:
      equals: '{"message":"Not allowed"}'
