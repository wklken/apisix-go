    - 5
  config:
    routes:
    - plugins:
        uri-blocker:
          block_rules:
          - aa
      upstream:
        nodes:
          '{{UPSTREAM_ADDR}}': 1
        type: roundrobin
      uri: /hello
      id: uri-blocker-4
  input:
    method: GET
    path: /hello?aa=1
  upstream:
    respond:
      status: 200
      body: hello world
  output:
    status: 403
    logs:
      matches: concat\ block_rules:\ aa
