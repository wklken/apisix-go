- name: test-018-hit-block-rule-and-return-rejected-msg
  source:
    file: t/plugin/uri-blocker.t
    tests:
    - 18
  config:
    routes:
    - plugins:
        uri-blocker:
          block_rules:
          - aa
          rejected_msg: access is not allowed
      upstream:
        nodes:
          '{{UPSTREAM_ADDR}}': 1
        type: roundrobin
      uri: /hello
      id: uri-blocker-17
  input:
    method: GET
    path: /hello?aa=1
  upstream:
    respond:
      status: 200
      body: hello world
  output:
    status: 403
    body:
      equals: '{"error_msg":"access is not allowed"}'
