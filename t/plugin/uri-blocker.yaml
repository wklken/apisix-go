- name: test-013-hit-block-rule
  source:
    file: t/plugin/uri-blocker.t
    tests:
    - 13
  config:
    routes:
    - plugins:
        uri-blocker:
          block_rules:
          - select.+(from|limit)
          - (?:(union(.*?)select))
      upstream:
        nodes:
          '{{UPSTREAM_ADDR}}': 1
        type: roundrobin
      uri: /hello
      id: uri-blocker-12
  input:
    method: GET
    path: /hello?name=;select%20from%20sys
  upstream:
    respond:
      status: 200
      body: hello world
  output:
    status: 403
    logs:
      matches: concat\ block_rules:\ select\.\+\(from\|limit\)\|\(\?:\(union\(\.\*\?\)select\)\),
