source:
  repository: https://github.com/apache/apisix
  commit: c3d7d5ec69774121f53d2e20d29d09c816795dd7
  file: t/plugin/uri-blocker.t
  tests: 22

cases:
  - name: reject-invalid-regular-expression
    source:
      tests: [1]
    config:
      routes:
        - id: uri-blocker-invalid-regex
          uri: /hello
          plugins:
            uri-blocker:
              block_rules: ['.+(']
    output:
      logs:
        matches: 'build route uri-blocker-invalid-regex fail:.*uri-blocker'

  - name: accept-multiple-valid-rules
    source:
      tests: [2]
    config:
      routes:
        - id: uri-blocker-valid-rules
          uri: /hello
          plugins:
            uri-blocker:
              block_rules: ['^a', '^b']
          upstream: &fixture_route
            type: roundrobin
            nodes:
              '{{UPSTREAM_ADDR}}': 1
    input:
      path: /hello
    upstream: &hello_fixture
      respond:
        status: 200
        body: hello world
    output: &hello_output
      status: 200
      body:
        equals: hello world

  - name: reject-one-invalid-rule
    source:
      tests: [3]
    config:
      routes:
        - id: uri-blocker-one-invalid-rule
          uri: /hello
          plugins:
            uri-blocker:
              block_rules: ['^a', '^b(']
    output:
      logs:
        matches: 'build route uri-blocker-one-invalid-rule fail:.*uri-blocker'

  - name: one-rule-blocks-query
    source:
      tests: [4, 5]
    config:
      routes:
        - id: uri-blocker-one-rule-block
          uri: /hello
          plugins: &one_rule_plugin
            uri-blocker:
              block_rules: [aa]
          upstream: *fixture_route
    input:
      path: /hello?aa=1
    upstream: *hello_fixture
    output:
      status: 403
      logs:
        matches: 'concat block_rules: aa'

  - name: one-rule-allows-other-query
    source:
      tests: [6]
    config:
      routes:
        - id: uri-blocker-one-rule-allow
          uri: /hello
          plugins: *one_rule_plugin
          upstream: *fixture_route
    input:
      path: /hello?bb=2
    upstream: *hello_fixture
    output:
      <<: *hello_output
      logs:
        matches: 'concat block_rules: aa'

  - name: multiple-rules-block-bb-value
    source:
      tests: [7, 8]
    config:
      routes:
        - id: uri-blocker-multiple-rules-bb-value
          uri: /hello
          plugins: &multiple_rules_plugin
            uri-blocker:
              block_rules: [aa, bb, 'c\d+']
          upstream: *fixture_route
    input:
      path: /hello?x=bb
    upstream: *hello_fixture
    output:
      status: 403
      logs: &multiple_rules_log
        matches: 'concat block_rules: aa[|]bb[|]c.*,'

  - name: multiple-rules-block-bb-key
    source:
      tests: [9]
    config:
      routes:
        - id: uri-blocker-multiple-rules-bb-key
          uri: /hello
          plugins: *multiple_rules_plugin
          upstream: *fixture_route
    input:
      path: /hello?bb=2
    upstream: *hello_fixture
    output:
      status: 403
      logs: *multiple_rules_log

  - name: multiple-rules-block-numeric-pattern
    source:
      tests: [10]
    config:
      routes:
        - id: uri-blocker-multiple-rules-numeric
          uri: /hello
          plugins: *multiple_rules_plugin
          upstream: *fixture_route
    input:
      path: /hello?c1=2
    upstream: *hello_fixture
    output:
      status: 403

  - name: multiple-rules-allow-nonmatch
    source:
      tests: [11]
    config:
      routes:
        - id: uri-blocker-multiple-rules-allow
          uri: /hello
          plugins: *multiple_rules_plugin
          upstream: *fixture_route
    input:
      path: /hello?cc=2
    upstream: *hello_fixture
    output: *hello_output

  - name: sql-select-blocked
    source:
      tests: [12, 13]
    config:
      routes:
        - id: uri-blocker-sql-select
          uri: /hello
          plugins: &sql_rules_plugin
            uri-blocker:
              block_rules: ['select.+(from|limit)', '(?:(union(.*?)select))']
          upstream: *fixture_route
    input:
      path: /hello?name=;select%20from%20sys
    upstream: *hello_fixture
    output:
      status: 403
      logs:
        matches: 'concat block_rules: select\.\+\(from\|limit\)\|\(\?:\(union\(\.\*\?\)select\)\),'

  - name: sql-union-select-blocked
    source:
      tests: [14]
    config:
      routes:
        - id: uri-blocker-sql-union
          uri: /hello
          plugins: *sql_rules_plugin
          upstream: *fixture_route
    input:
      path: /hello?name=;union%20select%20
    upstream: *hello_fixture
    output:
      status: 403

  - name: sql-rules-allow-nonmatch
    source:
      tests: [15]
    config:
      routes:
        - id: uri-blocker-sql-allow
          uri: /hello
          plugins: *sql_rules_plugin
          upstream: *fixture_route
    input:
      path: /hello?cc=2
    upstream: *hello_fixture
    output: *hello_output

  - name: reject-invalid-message
    source:
      tests: [16]
    variants:
      - name: empty
        config:
          routes:
            - id: uri-blocker-empty-message
              uri: /hello
              plugins:
                uri-blocker:
                  block_rules: ['^a']
                  rejected_msg: ''
        output:
          logs:
            matches: 'build route uri-blocker-empty-message fail:.*uri-blocker'
      - name: boolean
        config:
          routes:
            - id: uri-blocker-boolean-message
              uri: /hello
              plugins:
                uri-blocker:
                  block_rules: ['^a']
                  rejected_msg: true
        output:
          logs:
            matches: 'build route uri-blocker-boolean-message fail:.*uri-blocker'

  - name: custom-rejected-message
    source:
      tests: [17, 18]
    config:
      routes:
        - id: uri-blocker-custom-message
          uri: /hello
          plugins:
            uri-blocker:
              block_rules: [aa]
              rejected_msg: access is not allowed
          upstream: *fixture_route
    input:
      path: /hello?aa=1
    upstream: *hello_fixture
    output:
      status: 403
      body:
        equals: '{"error_msg":"access is not allowed"}'

  - name: case-insensitive
    source:
      tests: [19, 20]
    config:
      routes:
        - id: uri-blocker-case-insensitive
          uri: /hello
          plugins:
            uri-blocker:
              block_rules: [AA]
              rejected_msg: access is not allowed
              case_insensitive: true
          upstream: *fixture_route
    input:
      path: /hello?aa=1
    upstream: *hello_fixture
    output:
      status: 403
      body:
        equals: '{"error_msg":"access is not allowed"}'

  - name: normalized-path-cannot-bypass-anchor
    source:
      tests: [21, 22]
    runtime:
      apisix:
        normalize_uri_like_servlet: true
    config:
      routes:
        - id: uri-blocker-normalized-path
          uri: /internal/*
          plugins:
            uri-blocker:
              block_rules: ['^/internal/']
    input:
      path: /./internal/x?aa=1
    output:
      status: 403
