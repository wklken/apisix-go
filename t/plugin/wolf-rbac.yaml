cases:
    - config:
        consumers:
            - username: wolf-user
              plugins:
                wolf-rbac:
                    appid: integration
                    server: '{{FIXTURE.auth.URL}}'
        routes:
            - id: wolf-rbac-source-1
              plugins:
                wolf-rbac:
                    appid: integration
                    server: http://127.0.0.1:1
              upstream:
                nodes:
                    '{{FIXTURE.primary.ADDR}}': 1
                type: roundrobin
              uri: /probe
      fixtures:
        - kind: http
          name: primary
          expect:
            - method: GET
              path: {equals: /probe}
              headers:
                X-Username: {equals: integration}
          respond:
            - body: hello world
              headers: {}
              status: 200
        - kind: http
          name: auth
          expect:
            - method: GET
              path: {matches: '^/wolf/rbac/access_check\?.*action=GET.*'}
              headers:
                X-Rbac-Token: {equals: token}
          respond:
            - body: '{"ok":true,"reason":"","data":{"userInfo":{"id":"1","username":"integration"}}}'
              headers: {}
              status: 200
      name: wolf-rbac-source-1
      source:
        file: t/plugin/wolf-rbac.t
        tests:
            - 1
            - 2
            - 3
