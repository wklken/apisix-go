        output:
          status: 200
          body:
            equals: "hello world"
      - name: wolf-rbac-041-clientip-forwarded-from-trusted-x-real-ip-source
        input:
          method: GET
          path: "/hello"
          headers:
            Authorization: "V1#wolf-rbac-app#wolf-rbac-token"
            X-Real-IP: "192.0.2.10"
        output:
          status: 200
          body:
            equals: "hello world"
      - name: wolf-rbac-042-spoofed-x-real-ip-from-untrusted-source-is-ignored
        input:
          method: GET
          path: "/hello"
          headers:
            Authorization: "V1#wolf-rbac-app#wolf-rbac-token"
