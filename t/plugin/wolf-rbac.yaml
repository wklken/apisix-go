            equals: "hello world"
      - name: wolf-rbac-005-enable-wolf-rbac-plugin-using-admin-api
        input:
          method: GET
          path: "/apisix/plugin/wolf-rbac/change_pwd"
        output:
          status: 200
          body:
            equals: "hello world"
      - name: wolf-rbac-006-login-failed-appid-is-missing
        input:
          method: GET
          path: "/apisix/plugin/wolf-rbac/login"
          body: "username=admin&password=123456"
          headers:
            Content-Type: application/x-www-form-urlencoded
        output:
          status: 400
          body:
            equals: "validation failed"
      - name: wolf-rbac-007-login-failed-appid-not-found
        input:
          method: GET
          path: "/apisix/plugin/wolf-rbac/login"
          body: "appid=not-found&username=admin&password=123456"
          headers:
            Content-Type: application/x-www-form-urlencoded
        output:
          status: 400
          body:
            equals: "validation failed"
      - name: wolf-rbac-008-login-failed-username-missing
        input:
          method: GET
          path: "/apisix/plugin/wolf-rbac/login"
          body: "appid=wolf-rbac-app&password=123456"
          headers:
            Content-Type: application/x-www-form-urlencoded
        output:
          status: 200
          body:
            equals: "hello world"
      - name: wolf-rbac-009-login-failed-password-missing
        input:
          method: GET
          path: "/apisix/plugin/wolf-rbac/login"
          body: "appid=wolf-rbac-app&username=admin"
          headers:
            Content-Type: application/x-www-form-urlencoded
        output:
          status: 200
          body:
            equals: "hello world"
      - name: wolf-rbac-010-login-failed-username-not-found
        input:
          method: GET
          path: "/apisix/plugin/wolf-rbac/login"
          body: "appid=wolf-rbac-app&username=not-found&password=123456"
          headers:
            Content-Type: application/x-www-form-urlencoded
        output:
          status: 200
          body:
            equals: "hello world"
      - name: wolf-rbac-011-login-failed-wrong-password
        input:
          method: GET
          path: "/apisix/plugin/wolf-rbac/login"
          body: "appid=wolf-rbac-app&username=admin&password=wrong-password"
          headers:
            Content-Type: application/x-www-form-urlencoded
        output:
          status: 200
          body:
            equals: "hello world"
      - name: wolf-rbac-012-login-successfully
        input:
          method: GET
          path: "/apisix/plugin/wolf-rbac/change_pwd"
        output:
          status: 200
          body:
            equals: "hello world"
      - name: wolf-rbac-013-verify-missing-token
        input:
          method: GET
          path: "/hello"
        output:
          status: 401
          body:
            equals: "validation failed"
      - name: wolf-rbac-014-verify-invalid-rbac-token
        input:
          method: GET
          path: "/hello"
          headers:
            x-rbac-token: invalid-rbac-token
        output:
          status: 401
          body:
            equals: "validation failed"
      - name: wolf-rbac-015-verify-invalid-appid-in-rbac-token
        input:
          method: GET
          path: "/hello"
          headers:
            x-rbac-token: "V1#invalid-appid#rbac-token"
        output:
          status: 401
          body:
            equals: "validation failed"
      - name: wolf-rbac-016-verify-failed
        input:
          method: GET
          path: "/hello1"
          headers:
            x-rbac-token: "V1#wolf-rbac-app#wolf-rbac-token"
        output:
          status: 403
          body:
            equals: "validation failed"
      - name: wolf-rbac-017-verify-in-argument
        input:
          method: GET
          path: "/hello?rbac_token=V1%23wolf-rbac-app%23wolf-rbac-token"
        output:
          status: 200
          body:
            equals: "hello world"
          headers:
            X-UserId:
              equals: "100"
            X-Username:
              equals: admin
            X-Nickname:
              equals: administrator
      - name: wolf-rbac-018-verify-in-header-authorization
        input:
          method: GET
          path: "/hello"
          headers:
            Authorization: "V1#wolf-rbac-app#wolf-rbac-token"
        output:
          status: 200
          body:
            equals: "hello world"
          headers:
            X-UserId:
              equals: "100"
            X-Username:
              equals: admin
            X-Nickname:
              equals: administrator
      - name: wolf-rbac-019-verify-in-header-x-rbac-token
        input:
          method: GET
          path: "/hello"
          headers:
            x-rbac-token: "V1#wolf-rbac-app#wolf-rbac-token"
        output:
          status: 200
          body:
            equals: "hello world"
          headers:
            X-UserId:
              equals: "100"
            X-Username:
              equals: admin
            X-Nickname:
              equals: administrator
      - name: wolf-rbac-020-verify-in-cookie
        input:
          method: GET
          path: "/hello"
          headers:
            Cookie: "x-rbac-token=V1#wolf-rbac-app#wolf-rbac-token"
        output:
          status: 200
          body:
            equals: "hello world"
          headers:
            X-UserId:
              equals: "100"
            X-Username:
              equals: admin
            X-Nickname:
              equals: administrator
