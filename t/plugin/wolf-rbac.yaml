            body: {json_equals: '{"appid":"wolf-rbac-app","username":"admin","password":"123456"}'}
        respond:
          - {status: 200, body: '{"ok":true,"data":{"token":"wolf-rbac-token","userInfo":{"nickname":"administrator","username":"admin","id":"100"}}}'}
    steps: &secret_login_steps
