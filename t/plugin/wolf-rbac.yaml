      - name: wolf-rbac-024-change-password-failed-old-password-incorrect
        input:
          method: GET
          path: "/apisix/plugin/wolf-rbac/change_pwd"
          body: "{\"oldPassword\": \"error\", \"newPassword\": \"abcdef\"}"
          headers:
            Content-Type: application/json
            Cookie: "x-rbac-token=V1#wolf-rbac-app#wolf-rbac-token"
        output:
          status: 200
          body:
            equals: "hello world"
      - name: wolf-rbac-025-change-password
        input:
          method: GET
          path: "/apisix/plugin/wolf-rbac/change_pwd"
          body: "{\"oldPassword\":\"123456\", \"newPassword\": \"abcdef\"}"
          headers:
            Content-Type: application/json
            Cookie: "x-rbac-token=V1#wolf-rbac-app#wolf-rbac-token"
        output:
          status: 200
          body:
            equals: "hello world"
      - name: wolf-rbac-026-custom-headers-in-request-headers
        input:
          method: GET
          path: "/wolf/rbac/custom/headers?rbac_token=V1%23wolf-rbac-app%23wolf-rbac-token"
        output:
          status: 200
          body:
            equals: "hello world"
          headers:
            X-UserId:
              equals: "100"
            X-Username:
              equals: admin
            X-Nickname:
              equals: administrator
      - name: wolf-rbac-027-change-password-by-post-raw-args
        input:
          method: GET
          path: "/apisix/plugin/wolf-rbac/change_pwd"
          body: "oldPassword=123456&newPassword=abcdef"
          headers:
            Cookie: "x-rbac-token=V1#wolf-rbac-app#wolf-rbac-token"
        output:
          status: 200
          body:
            equals: "hello world"
      - name: wolf-rbac-028-change-password-by-post-raw-args-greater-than-100-args-is-ok
        input:
          method: GET
          path: "/apisix/plugin/wolf-rbac/change_pwd"
        output:
