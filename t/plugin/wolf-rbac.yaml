        - username: wolf_rbac_unit_test
          plugins:
            wolf-rbac:
              appid: '$secret://vault/test1/wolf_rbac_unit_test/appid'
              server: '{{FIXTURE.auth.URL}}'
      routes:
        - id: wolf-init
          uri: /_wolf-init
          plugins: {wolf-rbac: {}}
        - id: wolf-login
          uri: /apisix/plugin/wolf-rbac/login
          plugins: {public-api: {}}
    fixtures: &secret_fixtures
      - name: vault
        kind: http
        expect_requests: 1
