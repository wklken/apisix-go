      - name: wolf-rbac-037-verify-echo-plugin-in-consumer
        input:
          method: GET
          path: "/hello"
          headers:
            Authorization: "V1#wolf-rbac-app#wolf-rbac-token"
        output:
          status: 200
          body:
            equals: "hello world"
          headers:
            X-UserId:
              equals: "100"
            X-Username:
              equals: admin
            X-Nickname:
              equals: administrator
      - name: wolf-rbac-038-ssl-verify-false-is-passed-through-to-http-client
        input:
          method: GET
          path: "/apisix/plugin/wolf-rbac/change_pwd"
        output:
          status: 200
          body:
            equals: "hello world"
      - name: wolf-rbac-039-ssl-verify-true-is-passed-through-to-http-client
