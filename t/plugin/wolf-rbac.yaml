              X-Vault-Token: {equals: root}
              X-Vault-Namespace: {absent: true}
        respond: [{status: 200, body: '{"data":{"appid":"wolf-rbac-app"}}'}]
      - name: auth
        kind: http
        expect_requests: 1
        expect:
          - method: POST
