      - name: wolf-rbac-029-verify-failed-server-internal-error
        input:
          method: GET
          path: "/hello/500"
          headers:
            x-rbac-token: "V1#wolf-rbac-app#wolf-rbac-token"
        output:
          status: 500
          body:
            equals: "validation failed"
      - name: wolf-rbac-030-verify-failed-token-is-expired
        input:
          method: GET
          path: "/hello/401"
          headers:
            x-rbac-token: "V1#wolf-rbac-app#wolf-rbac-token"
        output:
          status: 401
