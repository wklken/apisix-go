    steps:
      - name: wolf-rbac-001-sanity
        input:
          method: GET
          path: "/t"
        output:
          status: 200
          body:
            equals: "hello world"
      - name: wolf-rbac-002-wrong-type-of-string
        input:
          method: GET
          path: "/t"
