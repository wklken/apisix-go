  - name: consumer-replacement-and-echo-rewrite
    source: {file: t/plugin/wolf-rbac.t, tests: [36, 37]}
    runtime: {plugins: [wolf-rbac, echo]}
    config:
      consumers:
        - username: wolf_rbac_unit_test
          plugins:
            wolf-rbac: {appid: wolf-rbac-app, server: '{{FIXTURE.auth.URL}}'}
      routes:
        - id: wolf-consumer-echo
          uri: /hello
          plugins: {wolf-rbac: {}}
          upstream: {type: roundrobin, nodes: {'{{FIXTURE.primary.ADDR}}': 1}}
    fixtures:
      - name: auth
        kind: http
        expect:
          - method: GET
            path: {matches: '^/wolf/rbac/access_check\?action=GET&appID=wolf-rbac-app&clientIP=127\.0\.0\.1&resName=%2F(probe|hello)$'}
            headers: *permission_headers
        respond: [*permission_success]
        count: {at_least: 2, at_most: 20, timeout: 200ms}
      - name: primary
        kind: http
        expect_requests: 1
        expect:
          - path: {equals: /hello}
            headers: *user_headers
        respond: [{status: 200, body: original-upstream-body}]
      - name: readiness
        kind: http
        expect:
          - path: {equals: /probe}
            headers: *user_headers
        respond: [{status: 200, body: readiness-upstream-body}]
        count: {at_least: 1, at_most: 19, timeout: 200ms}
    steps:
      - name: replace-consumer-with-echo-plugin
        config:
          consumers:
            - username: wolf_rbac_unit_test
              plugins:
                wolf-rbac: {appid: wolf-rbac-app, server: '{{FIXTURE.auth.URL}}'}
            - username: wolf_rbac_with_other_plugins
              plugins:
                wolf-rbac: {appid: wolf-rbac-app, server: '{{FIXTURE.auth.URL}}'}
                echo: {body: "consumer merge echo plugins\n"}
          routes:
            - id: wolf-consumer-echo
              uri: /hello
              plugins: {wolf-rbac: {}}
              upstream: {type: roundrobin, nodes: {'{{FIXTURE.primary.ADDR}}': 1}}
            - id: wolf-consumer-readiness
              uri: /probe
              plugins: {wolf-rbac: {}}
              upstream: {type: roundrobin, nodes: {'{{FIXTURE.readiness.ADDR}}': 1}}
        config_timeout: 5s
        config_probe:
          input: {path: /probe, headers: {Authorization: 'V1#wolf-rbac-app#wolf-rbac-token'}}
          output:
            status: 200
            body: {equals: "consumer merge echo plugins\n"}
        input: {path: /hello, headers: {Authorization: 'V1#wolf-rbac-app#wolf-rbac-token'}}
        output:
          status: 200
          headers:
            X-UserId: {equals: '100'}
            X-Username: {equals: admin}
            X-Nickname: {equals: administrator}
          body: {equals: "consumer merge echo plugins\n"}
          logs: {not_matches: 'consumer merge echo plugins|wolf-rbac-token|V1#wolf-rbac-app'}

  - name: ssl-verification
    source: {file: t/plugin/wolf-rbac.t, tests: [38, 39]}
    variants:
      - name: ssl-verify-false-allows-self-signed-provider
        runtime: {plugins: [public-api, wolf-rbac]}
        config:
          consumers:
            - username: wolf_rbac_ssl_verify_false
              plugins:
                wolf-rbac: {appid: wolf-rbac-app, server: '{{FIXTURE.auth.URL}}', ssl_verify: false}
          routes:
            - id: wolf-init
              uri: /_wolf-init
              plugins: {wolf-rbac: {server: '{{FIXTURE.auth.URL}}'}}
            - id: wolf-login
              uri: /apisix/plugin/wolf-rbac/login
              plugins: {public-api: {}}
        fixtures:
          - name: auth
            kind: https
            expect_requests: 1
            expect:
              - method: POST
                path: {equals: /wolf/rbac/login.rest}
                body: {json_equals: '{"appid":"wolf-rbac-app","username":"admin","password":"123456"}'}
            respond:
              - {status: 200, body: '{"ok":true,"data":{"token":"wolf-rbac-token","userInfo":{"username":"admin","id":"100"}}}'}
        steps:
          - name: login-through-self-signed-provider
            input:
              method: POST
              path: /apisix/plugin/wolf-rbac/login
              headers: {Content-Type: application/json}
              body: '{"appid":"wolf-rbac-app","username":"admin","password":"123456"}'
            output:
              status: 200
              body: {json_equals: '{"rbac_token":"V1#wolf-rbac-app#wolf-rbac-token","user_info":{"username":"admin","id":"100"}}'}
      - name: ssl-verify-true-rejects-self-signed-provider
        runtime: {plugins: [public-api, wolf-rbac]}
        config:
          consumers:
            - username: wolf_rbac_ssl_verify_true
              plugins:
                wolf-rbac: {appid: wolf-rbac-app, server: '{{FIXTURE.auth.URL}}', ssl_verify: true}
          routes:
            - id: wolf-init
              uri: /_wolf-init
              plugins: {wolf-rbac: {server: '{{FIXTURE.auth.URL}}'}}
            - id: wolf-login
              uri: /apisix/plugin/wolf-rbac/login
              plugins: {public-api: {}}
        fixtures:
          - name: auth
            kind: https
            expect_requests: 0
            respond: [{status: 200, body: should-not-run}]
        steps:
          - name: verified-client-rejects-self-signed-provider
            input:
              method: POST
              path: /apisix/plugin/wolf-rbac/login
              headers: {Content-Type: application/json}
              body: '{"appid":"wolf-rbac-app","username":"admin","password":"123456"}'
            output:
              status: 500
              body: {json_equals: '{"message":"request to wolf-server failed!"}'}
              logs: {matches: 'request to wolf-server failed:.*(x509|certificate)'}

  - name: trusted-and-untrusted-real-ip
    source: {file: t/plugin/wolf-rbac.t, tests: [41, 42]}
    variants:
      - name: trusted-real-ip-is-forwarded
        runtime: {plugins: [real-ip, wolf-rbac]}
        config:
          consumers:
            - username: wolf_rbac_unit_test
              plugins:
                wolf-rbac: {appid: wolf-rbac-app, server: '{{FIXTURE.auth.URL}}'}
          routes:
            - id: wolf-trusted-real-ip
              uri: /hello
              plugins:
                real-ip: {source: http_x_real_ip, trusted_addresses: [127.0.0.0/8]}
                wolf-rbac: {}
              upstream: {type: roundrobin, nodes: {'{{FIXTURE.primary.ADDR}}': 1}}
        fixtures:
          - name: auth
            kind: http
            expect_requests: 1
            expect:
              - method: GET
                path: {equals: '/wolf/rbac/access_check?action=GET&appID=wolf-rbac-app&clientIP=192.0.2.10&resName=%2Fhello'}
                headers: *permission_headers
            respond: [*permission_success]
          - name: primary
            kind: http
            expect_requests: 1
            expect: [{path: {equals: /hello}}]
            respond: [{status: 200, body: hello world}]
        steps:
          - name: trusted-header
            input:
              path: /hello
              headers: {Authorization: 'V1#wolf-rbac-app#wolf-rbac-token', X-Real-IP: 192.0.2.10}
            output: *allowed_output
      - name: untrusted-real-ip-is-ignored
        runtime: {plugins: [real-ip, wolf-rbac]}
        config:
          consumers:
            - username: wolf_rbac_unit_test
              plugins:
                wolf-rbac: {appid: wolf-rbac-app, server: '{{FIXTURE.auth.URL}}'}
          routes:
            - id: wolf-untrusted-real-ip
              uri: /hello
              plugins:
                real-ip: {source: http_x_real_ip, trusted_addresses: [192.0.2.1]}
                wolf-rbac: {}
              upstream: {type: roundrobin, nodes: {'{{FIXTURE.primary.ADDR}}': 1}}
        fixtures:
          - name: auth
            kind: http
            expect_requests: 1
            expect:
              - method: GET
                path: {equals: '/wolf/rbac/access_check?action=GET&appID=wolf-rbac-app&clientIP=127.0.0.1&resName=%2Fhello'}
                headers: *permission_headers
            respond: [*permission_success]
          - name: primary
            kind: http
            expect_requests: 1
            expect: [{path: {equals: /hello}}]
            respond: [{status: 200, body: hello world}]
        steps:
          - name: spoofed-header
            input:
              path: /hello
              headers: {Authorization: 'V1#wolf-rbac-app#wolf-rbac-token', X-Real-IP: 192.0.2.10}
            output: *allowed_output

