cases:
    - config:
        routes:
            - id: workflow-source-1
              plugins:
                workflow:
                    rules:
                        - actions:
                            - - return
                              - code: 200
              upstream:
                nodes:
                    '{{FIXTURE.primary.ADDR}}': 1
                type: roundrobin
              uri: /probe
      fixtures:
        - kind: http
          name: primary
          respond:
            - body: hello world
              headers: {}
              status: 200
      name: workflow-source-1
      source:
        file: t/plugin/workflow-without-case.t
        tests:
            - 1
            - 2
            - 3
            - 4
            - 5
            - 6
            - 7
      steps:
        - input:
            method: GET
            path: /probe
          name: real-plugin-return-action
          output:
            body:
                equals: '{"error_msg":"rejected by workflow"}'
            status: 200
